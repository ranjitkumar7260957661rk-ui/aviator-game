<!DOCTYPE html>
<html>
<head>
<title>Aviator Full Admin System</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
text-align:center;
}

.page{display:none;padding:20px;}

input,button{
padding:10px;
margin:5px;
border:none;
border-radius:5px;
}

button{
background:#00e5ff;
color:black;
font-weight:bold;
cursor:pointer;
}

#menu{
position:fixed;
top:0;
left:-220px;
width:200px;
height:100%;
background:#111;
transition:0.3s;
padding-top:40px;
}

#menu button{width:90%;margin:10px;}

.popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#222;
padding:20px;
border-radius:10px;
width:300px;
}

h1{color:#00ff99;font-size:50px;}

#plane{
position:absolute;
bottom:60px;
left:60px;
width:50px;
transition:0.1s linear;
}

.adminBox{
display:none;
background:#111;
padding:20px;
margin-top:20px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="page" style="display:block;">
<h2>Login</h2>
<input id="mobile" placeholder="Mobile"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<!-- GAME -->
<div id="gamePage" class="page">

<button onclick="toggleMenu()">☰ Menu</button>
<h3>₹ <span id="balance">0</span></h3>

<h1 id="multi">1.00x</h1>

<img id="plane" src="https://i.imgur.com/3Q9QZ5p.png">

<br>

<input id="betAmount" placeholder="Bet Amount"><br>

<button onclick="placeBet()">BET</button>
<button onclick="cashout()">CASHOUT</button>

<h3 id="status"></h3>
</div>

<!-- MENU -->
<div id="menu">
<button onclick="showDeposit()">Deposit</button>
<button onclick="showWithdraw()">Withdraw</button>
<button onclick="showAdmin()">Admin Panel</button>
<button onclick="logout()">Logout</button>
</div>

<!-- DEPOSIT -->
<div id="depositBox" class="popup">
<h3>Deposit</h3>

<p style="color:#00ff99">UPI: 7260957661@ybl</p>
<p>Minimum ₹500</p>

<input id="depAmount" placeholder="Amount"><br>
<input id="utr" placeholder="UTR"><br>

<button onclick="submitDeposit()">Submit</button>
<button onclick="closeAll()">Close</button>
</div>

<!-- WITHDRAW -->
<div id="withdrawBox" class="popup">
<h3>Withdraw</h3>

<input id="wname" placeholder="Name"><br>
<input id="bank" placeholder="Bank"><br>
<input id="acc" placeholder="Account"><br>
<input id="ifsc" placeholder="IFSC"><br>
<input id="wamount" placeholder="Amount"><br>

<button onclick="submitWithdraw()">Submit</button>
<button onclick="closeAll()">Close</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="popup" style="width:90%;max-height:80%;overflow:auto;">
<h2>Admin Panel</h2>
<button onclick="closeAll()">Close</button>

<div id="depositList"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, set, get, child, update, push, onValue }
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDCYEveGXPy1nORiyyeyIjsbfcqEy4iaVg",
authDomain: "avaitior-game.firebaseapp.com",
databaseURL: "https://avaitior-game-default-rtdb.firebaseio.com",
projectId: "avaitior-game"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* USER */
let currentUser = localStorage.getItem("user") || "";
let balance = 0;
let userBet = 0;
let crashed = false;

/* LOGIN */
window.login = ()=>{
let m = mobile.value;
let p = password.value;

if(!m || !p) return alert("Fill details");

currentUser = m;
localStorage.setItem("user",m);

get(child(ref(db),'users/'+m)).then((snap)=>{
if(snap.exists()){
if(snap.val().password==p){
openGame();
}else alert("Wrong password");
}else{
set(ref(db,'users/'+m),{
password:p,
balance:0
}).then(openGame);
}
});
};

function openGame(){
loginPage.style.display="none";
gamePage.style.display="block";
loadUser();
}

/* LOAD USER */
function loadUser(){
onValue(ref(db,'users/'+currentUser),(snap)=>{
if(snap.exists()){
balance = Number(snap.val().balance||0);
balanceEl.innerText = balance;
}
});
}

/* SAVE */
function save(){
update(ref(db,'users/'+currentUser),{balance});
}

/* MENU */
window.toggleMenu=()=>{
menu.style.left = (menu.style.left=="0px")?"-220px":"0px";
};

window.closeAll=()=>{
menu.style.left="-220px";
depositBox.style.display="none";
withdrawBox.style.display="none";
adminPanel.style.display="none";
};

window.showDeposit=()=>depositBox.style.display="block";
window.showWithdraw=()=>withdrawBox.style.display="block";

/* LOGOUT */
window.logout=()=>{
localStorage.removeItem("user");
location.reload();
};

/* GAME */
function startGame(){

let multiplier = 1;
crashed = false;
status.innerText = "";

let crashPoint = (Math.random()*4)+1.5;

let loop=setInterval(()=>{

multiplier += 0.04;

multi.innerText = multiplier.toFixed(2)+"x";

plane.style.left = (multiplier*35)+"px";
plane.style.bottom = (multiplier*12)+"px";

if(multiplier >= crashPoint){
clearInterval(loop);
crashed = true;
status.innerText = "CRASH 💥";
setTimeout(startGame,2000);
}

},120);

}

startGame();

/* BET */
window.placeBet=()=>{
let b = Number(betAmount.value);

if(b<=0) return alert("Invalid");
if(b>balance) return alert("Low balance");
if(userBet>0) return alert("Already bet");
if(crashed) return alert("Wait next round");

balance -= b;
userBet = b;
save();
};

/* CASHOUT */
window.cashout=()=>{
if(!userBet) return alert("No bet");
if(crashed) return alert("Crashed");

let win = Math.floor(userBet * parseFloat(multi.innerText));

balance += win;
save();

status.innerText = "Won ₹"+win;
userBet = 0;
};

/* DEPOSIT */
window.submitDeposit=()=>{
push(ref(db,'deposits'),{
user:currentUser,
amount:Number(depAmount.value),
utr:utr.value,
status:"pending"
});
alert("Deposit sent");
closeAll();
};

/* WITHDRAW */
window.submitWithdraw=()=>{
push(ref(db,'withdraws'),{
user:currentUser,
name:wname.value,
bank:bank.value,
account:acc.value,
ifsc:ifsc.value,
amount:Number(wamount.value),
status:"pending"
});
alert("Withdraw sent");
closeAll();
};

/* ADMIN PANEL */
window.showAdmin=()=>{

let pass = prompt("Admin Password");

if(pass!="admin123"){
alert("Wrong admin password");
return;
}

adminPanel.style.display="block";

loadDeposits();
};

/* LOAD DEPOSITS */
function loadDeposits(){

onValue(ref(db,'deposits'),(snap)=>{

let html = "";

snap.forEach((child)=>{

let d = child.val();
let key = child.key;

html += `
<div style="background:#222;margin:10px;padding:10px;">
<p>User: ${d.user}</p>
<p>Amount: ₹${d.amount}</p>
<p>UTR: ${d.utr}</p>
<p>Status: ${d.status}</p>

<button onclick="approve('${key}','${d.user}',${d.amount})">Approve</button>
<button onclick="reject('${key}')">Reject</button>
</div>
`;

});

depositList.innerHTML = html;

});

}

/* APPROVE */
window.approve = async (key,user,amount)=>{

// update deposit status
update(ref(db,'deposits/'+key),{status:"approved"});

// get user balance
let snap = await get(ref(db,'users/'+user));

if(snap.exists()){
let bal = snap.val().balance || 0;

update(ref(db,'users/'+user),{
balance: bal + amount
});
}

alert("Approved");
};

/* REJECT */
window.reject = (key)=>{
update(ref(db,'deposits/'+key),{status:"rejected"});
alert("Rejected");
};

</script>

</body>
</html>
