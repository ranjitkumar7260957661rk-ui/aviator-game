<!DOCTYPE html>
<html>
<head>
<title>Aviator Stable Fix</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
text-align:center;
}

.page{display:none;padding:20px;}

input,button{
padding:10px;
margin:5px;
border:none;
border-radius:5px;
}

button{
background:#00e5ff;
color:black;
font-weight:bold;
cursor:pointer;
}

#menu{
position:fixed;
top:0;
left:-220px;
width:200px;
height:100%;
background:#111;
transition:0.3s;
padding-top:40px;
}

#menu button{width:90%;margin:10px;}

.popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#222;
padding:20px;
border-radius:10px;
width:300px;
}

h1{color:#00ff99;font-size:50px;}

#plane{
position:absolute;
bottom:60px;
left:60px;
width:50px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="page" style="display:block;">
<h2>Login</h2>
<input id="mobile" placeholder="Mobile"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<!-- GAME -->
<div id="gamePage" class="page">

<button onclick="toggleMenu()">☰ Menu</button>
<h3>₹ <span id="balance">0</span></h3>

<h1 id="multi">1.00x</h1>

<div style="height:120px;position:relative;">
<img id="plane" src="https://i.imgur.com/3Q9QZ5p.png">
</div>

<input id="betAmount" placeholder="Bet Amount"><br>

<button onclick="placeBet()">BET</button>
<button onclick="cashout()">CASHOUT</button>

<h3 id="status"></h3>
</div>

<!-- MENU -->
<div id="menu">
<button onclick="showDeposit()">Deposit</button>
<button onclick="showWithdraw()">Withdraw</button>
<button onclick="showAdmin()">Admin</button>
<button onclick="logout()">Logout</button>
</div>

<!-- DEPOSIT -->
<div id="depositBox" class="popup">
<h3>Deposit</h3>

<p>UPI: 7260957661@ybl</p>
<p>Min ₹500</p>

<input id="depAmount" placeholder="Amount"><br>
<input id="utr" placeholder="UTR"><br>

<button onclick="submitDeposit()">Submit</button>
<button onclick="closeAll()">Close</button>
</div>

<!-- WITHDRAW -->
<div id="withdrawBox" class="popup">
<h3>Withdraw</h3>

<input id="wname" placeholder="Name"><br>
<input id="bank" placeholder="Bank"><br>
<input id="acc" placeholder="Account"><br>
<input id="ifsc" placeholder="IFSC"><br>
<input id="wamount" placeholder="Amount"><br>

<button onclick="submitWithdraw()">Submit</button>
<button onclick="closeAll()">Close</button>
</div>

<!-- ADMIN -->
<div id="adminBox" class="popup" style="width:90%;height:80%;overflow:auto;">
<h3>Admin Panel</h3>
<button onclick="closeAll()">Close</button>
<div id="list"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, set, get, child, update, push, onValue }
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDCYEveGXPy1nORiyyeyIjsbfcqEy4iaVg",
databaseURL: "https://avaitior-game-default-rtdb.firebaseio.com",
projectId: "avaitior-game"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* STATE */
let user = "";
let balance = 0;
let bet = 0;
let crashed = false;
let running = false;

/* ELEMENTS */
const multi = document.getElementById("multi");
const plane = document.getElementById("plane");
const status = document.getElementById("status");

/* LOGIN */
window.login = ()=>{
let m = mobile.value;
let p = password.value;

if(!m || !p) return alert("Fill details");

user = m;

get(child(ref(db),'users/'+m)).then(snap=>{
if(snap.exists()){
if(snap.val().password==p) openGame();
else alert("Wrong password");
}else{
set(ref(db,'users/'+m),{
password:p,
balance:0
}).then(openGame);
}
});
};

function openGame(){
loginPage.style.display="none";
gamePage.style.display="block";
loadUser();
}

/* LOAD */
function loadUser(){
onValue(ref(db,'users/'+user),snap=>{
if(snap.exists()){
balance = snap.val().balance||0;
document.getElementById("balance").innerText = balance;
}
});
}

/* SAVE */
function save(){
update(ref(db,'users/'+user),{balance});
}

/* MENU */
window.toggleMenu=()=>{
menu.style.left = (menu.style.left=="0px")?"-220px":"0px";
};

window.closeAll=()=>{
menu.style.left="-220px";
depositBox.style.display="none";
withdrawBox.style.display="none";
adminBox.style.display="none";
};

window.showDeposit=()=>depositBox.style.display="block";
window.showWithdraw=()=>withdrawBox.style.display="block";

/* GAME SAFE LOOP */
function startGame(){

if(running) return;
running = true;

let m = 1;
crashed = false;
status.innerText="";

let crashPoint = (Math.random()*4)+1.5;

let loop=setInterval(()=>{

m += 0.03;

multi.innerText = m.toFixed(2)+"x";

plane.style.left = (m*30)+"px";

if(m>=crashPoint){

clearInterval(loop);
crashed = true;
running = false;

status.innerText="CRASH 💥";

setTimeout(startGame,2000);
}

},120);
}

startGame();

/* BET */
window.placeBet=()=>{
let b = Number(betAmount.value);

if(b<=0) return alert("Invalid");
if(b>balance) return alert("Low balance");
if(bet>0) return alert("Already bet");
if(crashed) return alert("Wait");

balance -= b;
bet = b;
save();
};

/* CASHOUT */
window.cashout=()=>{
if(!bet) return alert("No bet");
if(crashed) return alert("Crashed");

let win = Math.floor(bet * parseFloat(multi.innerText));

balance += win;
save();

status.innerText="Won ₹"+win;

bet = 0;
};

/* DEPOSIT */
window.submitDeposit=()=>{
push(ref(db,'deposits'),{
user,
amount:Number(depAmount.value),
utr:utr.value,
status:"pending"
});
alert("Sent");
closeAll();
};

/* WITHDRAW */
window.submitWithdraw=()=>{
push(ref(db,'withdraws'),{
user,
name:wname.value,
bank:bank.value,
account:acc.value,
ifsc:ifsc.value,
amount:Number(wamount.value),
status:"pending"
});
alert("Sent");
closeAll();
};

/* ADMIN */
window.showAdmin=()=>{
let pass=prompt("Admin Password");
if(pass!="admin123") return alert("Wrong");

adminBox.style.display="block";

onValue(ref(db,'deposits'),snap=>{
let html="";
snap.forEach(d=>{
let v=d.val();
html+=`
<div style="background:#333;margin:10px;padding:10px;">
<p>${v.user} - ₹${v.amount}</p>
<p>Status: ${v.status}</p>
<button onclick="approve('${d.key}',${v.amount},'${v.user}')">Approve</button>
<button onclick="reject('${d.key}')">Reject</button>
</div>`;
});
list.innerHTML=html;
});
};

window.approve=(key,amount,u)=>{
update(ref(db,'deposits/'+key),{status:"approved"});
get(child(ref(db),'users/'+u)).then(s=>{
let b=s.val().balance||0;
update(ref(db,'users/'+u),{balance:b+amount});
});
};

window.reject=(key)=>{
update(ref(db,'deposits/'+key),{status:"rejected"});
};

</script>

</body>
</html>
