<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aviator Demo</title>

<style>

body{
margin:0;
background:#111;
font-family:Arial;
color:white;
text-align:center;
}

#topbar{
background:#000;
padding:15px;
font-size:22px;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
}

#multi{
font-size:75px;
margin-top:70px;
color:#00ff99;
}

#betTimer{
font-size:22px;
margin-top:15px;
color:yellow;
}

#nextRound{
font-size:20px;
margin-top:10px;
color:#00bcd4;
}

#status{
font-size:26px;
margin-top:20px;
}

input{
padding:12px;
width:220px;
border:none;
border-radius:8px;
margin-top:20px;
font-size:17px;
}

button{
padding:12px 20px;
margin:8px;
border:none;
border-radius:8px;
background:#00bcd4;
color:white;
font-size:16px;
font-weight:bold;
}

#history{
margin-top:25px;
padding:10px;
font-size:18px;
color:#ccc;
}

</style>
</head>

<body>

<div id="topbar">

<div>Demo Balance ₹<span id="balance">1000</span></div>

<button onclick="resetBalance()">Reset</button>

</div>

<h1 id="multi">1.00x</h1>

<div id="betTimer">Bet Time: 5</div>

<div id="nextRound"></div>

<input type="number" id="betAmount" placeholder="Enter Bet"><br>

<button onclick="placeBet()">BET</button>

<button onclick="cashout()">CASHOUT</button>

<h2 id="status"></h2>

<div id="history">
Last Crashes:
<span id="historyList">-</span>
</div>

<script>

let balance = 1000;

let multiplier = 1;

let crashed = false;

let userBet = 0;

let betClosed = false;

let cashedOut = false;

let history = [];

document.getElementById("balance").innerText = balance;

/* START ROUND */

function startRound(){

multiplier = 1;

crashed = false;

userBet = 0;

betClosed = false;

cashedOut = false;

document.getElementById("multi").innerText = "1.00x";

document.getElementById("status").innerText = "";

document.getElementById("nextRound").innerText = "";

let betTime = 5;

document.getElementById("betTimer").innerText =
"Bet Time: " + betTime;

let betLoop = setInterval(()=>{

betTime--;

document.getElementById("betTimer").innerText =
"Bet Time: " + betTime;

if(betTime <= 0){

clearInterval(betLoop);

betClosed = true;

document.getElementById("betTimer").innerText =
"BET CLOSED";

startFlying();

}

},1000);

}

/* FLY */

function startFlying(){

let random = Math.random();

let crashPoint;

/* Mostly low crashes */

if(random < 0.60){

crashPoint = Number(
(Math.random()*1.5 + 1.20).toFixed(2)
);

}

/* Medium */

else if(random < 0.90){

crashPoint = Number(
(Math.random()*2 + 2.50).toFixed(2)
);

}

/* High */

else{

crashPoint = Number(
(Math.random()*5 + 5).toFixed(2)
);

}

let flyLoop = setInterval(()=>{

if(crashed){

clearInterval(flyLoop);

return;

}

multiplier += 0.02;

document.getElementById("multi").innerText =
multiplier.toFixed(2) + "x";

if(multiplier >= crashPoint){

crashed = true;

clearInterval(flyLoop);

history.unshift(crashPoint.toFixed(2)+"x");

history = history.slice(0,10);

document.getElementById("historyList").innerText =
history.join(" | ");

document.getElementById("status").innerText =
"CRASHED 💥 at " + crashPoint.toFixed(2) + "x";

let t = 3;

document.getElementById("nextRound").innerText =
"Next Round In " + t;

let timerLoop = setInterval(()=>{

t--;

document.getElementById("nextRound").innerText =
"Next Round In " + t;

if(t <= 0){

clearInterval(timerLoop);

document.getElementById("nextRound").innerText = "";

startRound();

}

},1000);

}

},170);

}

/* BET */

function placeBet(){

let bet =
Number(document.getElementById("betAmount").value);

if(betClosed){

alert("Bet Closed");

return;

}

if(userBet > 0){

alert("Already Bet");

return;

}

if(bet <= 0){

alert("Invalid Bet");

return;

}

if(bet > balance){

alert("Low Balance");

return;

}

balance -= bet;

document.getElementById("balance").innerText = balance;

userBet = bet;

document.getElementById("status").innerText =
"Bet Placed ₹" + bet;

}

/* CASHOUT */

function cashout(){

if(userBet <= 0){

alert("No Bet");

return;

}

if(cashedOut){

alert("Already Cashed Out");

return;

}

if(crashed){

alert("Round Crashed");

return;

}

let win = Math.floor(userBet * multiplier);

balance += win;

document.getElementById("balance").innerText = balance;

document.getElementById("status").innerText =
"You Won ₹" + win;

cashedOut = true;

userBet = 0;

}

/* RESET */

function resetBalance(){

balance = 1000;

document.getElementById("balance").innerText = balance;

}

startRound();

</script>

</body>
</html>
