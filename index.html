<!DOCTYPE html>
<html>
<head>
<title>Aviator Game</title>
<style>
body { background:#111; color:#fff; text-align:center; font-family:sans-serif; }
input, button { padding:10px; margin:5px; }
#game { display:none; }
#plane { font-size:40px; transition: all 0.2s linear; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>Login</h2>
<input id="mobile" placeholder="Mobile"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<!-- GAME -->
<div id="game">
<h1>✈️ Aviator</h1>
<h3>Balance: ₹<span id="bal">0</span></h3>

<input id="bet" placeholder="Enter Bet"><br>

<button onclick="startGame()">Start</button>
<button onclick="cashout()">Cashout</button>

<h2 id="multi">1.00x</h2>
<div id="plane">✈️</div>
</div>

<script>
let balance = 0;
let multi = 1;
let running = false;
let user = "";

// LOGIN SYSTEM
function login() {
  let m = document.getElementById("mobile").value;
  let p = document.getElementById("pass").value;

  if(m.length < 5 || p.length < 3){
    alert("Enter valid details");
    return;
  }

  user = m;

  let saved = localStorage.getItem("user_"+m);
  if(saved){
    balance = Number(saved);
  } else {
    balance = 100; // first time bonus
    localStorage.setItem("user_"+m, balance);
  }

  document.getElementById("bal").innerText = balance;
  document.getElementById("login").style.display = "none";
  document.getElementById("game").style.display = "block";
}

// GAME START
function startGame() {
  let bet = Number(document.getElementById("bet").value);

  if (!bet || bet <= 0 || bet > balance) {
    alert("Invalid Bet");
    return;
  }

  balance -= bet;
  updateBalance();

  multi = 1;
  running = true;

  let crash = Math.random() * 5 + 1;

  let plane = document.getElementById("plane");
  plane.style.transform = "translateX(0px)";

  let interval = setInterval(() => {
    if (!running) {
      clearInterval(interval);
      return;
    }

    multi += 0.05;
    document.getElementById("multi").innerText = multi.toFixed(2) + "x";

    // plane move
    let move = multi * 20;
    plane.style.transform = "translateX(" + move + "px)";

    if (multi >= crash) {
      document.getElementById("multi").innerText = "💥 Crashed!";
      running = false;
      clearInterval(interval);
    }

  }, 200);
}

// CASHOUT
function cashout() {
  if (!running) return;

  let bet = Number(document.getElementById("bet").value);
  let win = bet * multi;

  balance += win;
  updateBalance();

  running = false;
  document.getElementById("multi").innerText = "✅ Cashed: ₹" + win.toFixed(2);
}

// SAVE BALANCE
function updateBalance(){
  document.getElementById("bal").innerText = balance;
  localStorage.setItem("user_"+user, balance);
}
</script>

</body>
</html>
