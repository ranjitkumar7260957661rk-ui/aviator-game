<!DOCTYPE html>
<html>
<head>
<title>Aviator Full Game</title>

<style>
body { background:#111; color:#fff; text-align:center; font-family:sans-serif; }

input, button {
  padding:10px; margin:5px;
}

#game, #depositPage, #withdrawPage { display:none; }

#plane {
  font-size:40px;
  position:relative;
  left:0;
  transition: all 0.1s linear;
}
</style>
</head>

<body>

<h2 id="title">Login</h2>

<div id="login">
  <input id="mobile" placeholder="Mobile"><br>
  <input id="pass" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<div id="game">
  <h3>Balance: ₹<span id="bal">0</span></h3>

  <button onclick="showDeposit()">Deposit</button>
  <button onclick="showWithdraw()">Withdraw</button>

  <h1 id="plane">✈️</h1>
  <h1 id="multi">1.00x</h1>

  <input id="bet" placeholder="Bet"><br>
  <button onclick="start()">Start</button>
  <button onclick="cashout()">Cashout</button>
</div>

<div id="depositPage">
  <h3>UPI: 7260957661@ybl</h3>
  <p>Max ₹500</p>
  <input id="depAmt" placeholder="Amount">
  <input id="utr" placeholder="UTR">
  <button onclick="deposit()">Submit</button>
  <button onclick="back()">Back</button>
</div>

<div id="withdrawPage">
  <input id="bank" placeholder="Bank Name">
  <input id="acc" placeholder="Account No">
  <input id="ifsc" placeholder="IFSC">
  <input id="wAmt" placeholder="Amount (max 500)">
  <button onclick="withdraw()">Submit</button>
  <button onclick="back()">Back</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDCYEveGXPy1nORiyyeyIjsbfcqEy4iaVg",
  authDomain: "avaitior-game.firebaseapp.com",
  databaseURL: "https://avaitior-game-default-rtdb.firebaseio.com",
  projectId: "avaitior-game",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let user = "";
let balance = 0;
let multi = 1;
let interval;
let running = false;

window.login = async function() {
  user = document.getElementById("mobile").value;
  let pass = document.getElementById("pass").value;

  if(!user || !pass) return alert("Fill details");

  const snapshot = await get(child(ref(db), "users/"+user));
  
  if(snapshot.exists()){
    balance = snapshot.val().balance;
  } else {
    balance = 100;
    await set(ref(db,"users/"+user), {balance:100});
  }

  document.getElementById("bal").innerText = balance;
  document.getElementById("login").style.display="none";
  document.getElementById("game").style.display="block";
}

window.start = function(){
  let bet = Number(document.getElementById("bet").value);
  if(bet<=0 || bet>balance) return alert("Invalid Bet");

  balance -= bet;
  updateBal();

  multi = 1;
  running = true;
  let pos = 0;

  interval = setInterval(()=>{
    multi += 0.05;
    pos += 5;

    document.getElementById("multi").innerText = multi.toFixed(2)+"x";
    document.getElementById("plane").style.left = pos+"px";

    if(Math.random()<0.03){
      clearInterval(interval);
      running=false;
      alert("Crashed at "+multi.toFixed(2));
    }

  },100);
}

window.cashout = function(){
  if(!running) return;
  running=false;
  clearInterval(interval);

  let win = multi * Number(document.getElementById("bet").value);
  balance += win;

  updateBal();
  alert("Won ₹"+win.toFixed(0));
}

function updateBal(){
  document.getElementById("bal").innerText = balance;
  set(ref(db,"users/"+user+"/balance"), balance);
}

window.showDeposit = ()=> {
  document.getElementById("game").style.display="none";
  document.getElementById("depositPage").style.display="block";
}

window.showWithdraw = ()=> {
  document.getElementById("game").style.display="none";
  document.getElementById("withdrawPage").style.display="block";
}

window.back = ()=> {
  document.getElementById("depositPage").style.display="none";
  document.getElementById("withdrawPage").style.display="none";
  document.getElementById("game").style.display="block";
}

window.deposit = ()=>{
  alert("Request Sent (Manual Approve)");
}

window.withdraw = ()=>{
  alert("Withdraw Request Sent");
}
</script>

</body>
</html>
