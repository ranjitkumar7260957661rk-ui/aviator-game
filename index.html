<!DOCTYPE html>
<html>
<head>
<title>Aviator Clean Stable</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
text-align:center;
overflow:hidden;
}

.page{display:none;padding:20px;}

input,button{
padding:10px;
margin:5px;
border:none;
border-radius:5px;
}

button{
background:#00e5ff;
color:black;
font-weight:bold;
}

#plane{
position:absolute;
bottom:80px;
left:60px;
width:50px;
}

#multi{
font-size:50px;
color:#00ff99;
transition:0.1s;
}

.popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#222;
padding:20px;
border-radius:10px;
width:300px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="page" style="display:block;">
<h2>Login</h2>
<input id="mobile" placeholder="Mobile"><br>
<input id="password" type="password"><br>
<button onclick="login()">Login</button>
</div>

<!-- GAME -->
<div id="gamePage" class="page">

<h3>Balance ₹<span id="balance">0</span></h3>

<div id="multi">1.00x</div>

<div style="height:120px;position:relative;">
<img id="plane" src="https://i.imgur.com/3Q9QZ5p.png">
</div>

<input id="betAmount" placeholder="Bet"><br>

<button onclick="placeBet()">BET</button>
<button onclick="cashout()">CASHOUT</button>

<h3 id="status"></h3>

<button onclick="showDeposit()">Deposit</button>
<button onclick="showWithdraw()">Withdraw</button>

</div>

<!-- DEPOSIT -->
<div id="depositBox" class="popup">
<h3>Deposit</h3>
<p>UPI: 7260957661@ybl</p>
<p>Min ₹500</p>

<input id="depAmount" placeholder="Amount"><br>
<input id="utr" placeholder="UTR"><br>

<button onclick="submitDeposit()">Submit</button>
<button onclick="closeAll()">Close</button>
</div>

<!-- WITHDRAW -->
<div id="withdrawBox" class="popup">
<h3>Withdraw</h3>

<input id="wname"><br>
<input id="bank"><br>
<input id="acc"><br>
<input id="ifsc"><br>
<input id="wamount"><br>

<button onclick="submitWithdraw()">Submit</button>
<button onclick="closeAll()">Close</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, set, get, child, update, push, onValue }
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDCYEveGXPy1nORiyyeyIjsbfcqEy4iaVg",
databaseURL: "https://avaitior-game-default-rtdb.firebaseio.com",
projectId: "avaitior-game"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* STATE */
let user = "";
let balance = 0;
let bet = 0;
let running = false;

/* AUTO LOGIN SAFE */
user = localStorage.getItem("user") || "";
if(user) openGame();

/* LOGIN */
window.login = ()=>{
let m = mobile.value;
let p = password.value;

user = m;
localStorage.setItem("user",m);

get(child(ref(db),'users/'+m)).then(s=>{
if(s.exists()){
if(s.val().password==p) openGame();
else alert("Wrong");
}else{
set(ref(db,'users/'+m),{
password:p,
balance:0
}).then(openGame);
}
});
};

function openGame(){
loginPage.style.display="none";
gamePage.style.display="block";
loadUser();
startGame();
}

/* LOAD USER */
function loadUser(){
onValue(ref(db,'users/'+user),snap=>{
if(snap.exists()){
balance = snap.val().balance||0;
balanceEl.innerText = balance;
}
});
}

/* SAVE */
function save(){
update(ref(db,'users/'+user),{balance});
}

/* GAME FIXED (NO GLITCH / NO DOUBLE LOOP) */
function startGame(){

if(running) return;
running = true;

let m = 1;
let crash = (Math.random()*4)+1.5;

status.innerText="";

let loop=setInterval(()=>{

m += 0.02;

multi.innerText = m.toFixed(2)+"x";

plane.style.left = (m*25)+"px";

/* STOP */
if(m>=crash){
clearInterval(loop);
running=false;
status.innerText="CRASH 💥";
setTimeout(startGame,2000);
}

},120);
}

/* BET */
window.placeBet=()=>{
let b = Number(betAmount.value);

if(b<=0) return alert("Invalid");
if(b>balance) return alert("Low balance");
if(bet>0) return alert("Already bet");

balance -= b;
bet = b;
save();
};

/* CASHOUT */
window.cashout=()=>{
if(!bet) return alert("No bet");

let win = Math.floor(bet * parseFloat(multi.innerText));

balance += win;
save();

status.innerText="Won ₹"+win;

bet = 0;
};

/* DEPOSIT FIX (ALL DEVICES WORK) */
window.submitDeposit=()=>{
push(ref(db,'deposits'),{
user,
amount:Number(depAmount.value),
utr:utr.value,
status:"pending"
});
alert("Sent");
closeAll();
};

/* WITHDRAW */
window.submitWithdraw=()=>{
push(ref(db,'withdraws'),{
user,
name:wname.value,
bank:bank.value,
account:acc.value,
ifsc:ifsc.value,
amount:Number(wamount.value),
status:"pending"
});
alert("Sent");
closeAll();
};

/* UI */
window.showDeposit=()=>depositBox.style.display="block";
window.showWithdraw=()=>withdrawBox.style.display="block";

window.closeAll=()=>{
depositBox.style.display="none";
withdrawBox.style.display="none";
};

</script>

</body>
</html>
