<!DOCTYPE html>
<html>
<head>
<title>Aviator</title>

<style>
body { background:#111; color:#fff; text-align:center; font-family:sans-serif; }

input, button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:5px;
}

button { background:#333; color:#fff; }

#plane {
  font-size:50px;
  margin:20px;
  transition: transform 0.1s linear;
}
</style>

</head>
<body>

<h2>Aviator ✈️</h2>

<!-- LOGIN -->
<div id="login">
  <input id="mobile" placeholder="Mobile"><br>
  <input id="pass" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- GAME -->
<div id="game" style="display:none;">
  <h3>Balance: ₹<span id="bal">0.00</span></h3>

  <button onclick="showDeposit()">Deposit</button>
  <button onclick="showWithdraw()">Withdraw</button>

  <div id="plane">✈️</div>
  <h1 id="multi">1.00x</h1>

  <input id="bet" placeholder="Bet Amount"><br>
  <button onclick="startBet()">Start</button>
  <button onclick="cashout()">Cashout</button>
</div>
<!-- WITHDRAW -->
<div id="withdraw" style="display:none;">
  <h3>Withdraw</h3>
  <p>Max Withdraw: ₹500</p>
  <input id="name" placeholder="Name">
  <input id="acc" placeholder="Account Number">
  <input id="ifsc" placeholder="IFSC">
  <input id="withAmt" placeholder="Amount">
  <button onclick="sendWithdraw()">Submit</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update, push } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyDCYEveGXPy1nORiyyeyIjsbfcqEy4iaVg",
  authDomain: "avaitior-game.firebaseapp.com",
  databaseURL: "https://avaitior-game-default-rtdb.firebaseio.com",
  projectId: "avaitior-game"
});

const db = getDatabase(app);

let user = "";
let balance = 0;
let multiplier = 1;
let running = false;
let betAmt = 0;

// LOGIN
window.login = async function() {
  user = document.getElementById("mobile").value;

  let snap = await get(ref(db, "users/" + user));

  if (!snap.exists()) {
    balance = 100;
    await set(ref(db, "users/" + user), { balance: balance });
  } else {
    balance = snap.val().balance || 0;
  }

balance = parseFloat(balance).toFixed(2);

  document.getElementById("bal").innerText = balance;

  document.getElementById("login").style.display="none";
  document.getElementById("game").style.display="block";
}

// START BET
window.startBet = function() {
  if (running) return;

  betAmt = parseFloat(document.getElementById("bet").value);

  if (!betAmt || betAmt <= 0 || betAmt > balance) {
    alert("Invalid Bet");
    return;
  }

  balance -= betAmt;
  balance = parseFloat(balance.toFixed(2));

  update(ref(db, "users/" + user), { balance });

  document.getElementById("bal").innerText = balance;

  startGame();
}

// GAME
function startGame() {
  running = true;
  multiplier = 1;

  let crash = Math.random() * 5 + 1;

  let plane = document.getElementById("plane");

  let interval = setInterval(()=>{
    multiplier += 0.05;

    document.getElementById("multi").innerText = multiplier.toFixed(2) + "x";

    plane.style.transform = "translateY(-" + (multiplier*10) + "px)";

    if (multiplier >= crash) {
      clearInterval(interval);
      running = false;
      plane.innerText = "💥";
    }

  },100);
}

  // CASHOUT
window.cashout = function() {
  if (!running) return;

  let win = betAmt * multiplier;

  balance += win;
  balance = parseFloat(balance.toFixed(2));

  update(ref(db, "users/" + user), { balance });

  document.getElementById("bal").innerText = balance;

  running = false;
}

// DEPOSIT
window.showDeposit = ()=> document.getElementById("deposit").style.display="block";

window.sendDeposit = ()=>{
  let amt = document.getElementById("depAmt").value;

  if (amt > 500) return alert("Max 500");

  push(ref(db,"deposit"), {
    user, amt, status:"pending"
  });

  alert("Deposit request sent");
}

// WITHDRAW
window.showWithdraw = ()=> document.getElementById("withdraw").style.display="block";

window.sendWithdraw = ()=>{
  let amt = document.getElementById("withAmt").value;

  if (amt > 500) return alert("Max 500");

  push(ref(db,"withdraw"), {
    user, amt, status:"pending"
  });

  alert("Withdraw request sent");
}

</script>

</body>
</html>
