<!DOCTYPE html>
<html>
<head>
  <title>Realtime Aviator</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#111;
      color:white;
      text-align:center;
    }

    .page{
      display:none;
      padding:20px;
    }

    input,button{
      padding:12px;
      margin:5px;
      border:none;
      border-radius:5px;
    }

    button{
      background:#00bcd4;
      color:white;
    }

    #topbar{
      background:#000;
      padding:10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    h1{
      font-size:60px;
      color:#00ff99;
      margin-top:60px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->

<div id="loginPage" class="page" style="display:block;">

  <h2>Login</h2>

  <input id="mobile" placeholder="Mobile Number"><br>

  <input id="password" type="password" placeholder="Password"><br>

  <button onclick="login()">Login</button>

</div>

<!-- GAME -->

<div id="gamePage" class="page">

  <div id="topbar">

    <h3>Balance ₹<span id="balance">0</span></h3>

    <button onclick="logout()">Logout</button>

  </div>

  <h1 id="multi">1.00x</h1>

  <input id="betAmount" placeholder="Bet Amount"><br>

  <button onclick="placeBet()">BET</button>

  <button onclick="cashout()">CASHOUT</button>

  <h3 id="status"></h3>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";

import {
  getDatabase,
  ref,
  set,
  get,
  child,
  update,
  onValue
}
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

/* FIREBASE */

const firebaseConfig = {

  apiKey: "AIzaSyDCYEveGXPy1nORiyyeyIjsbfcqEy4iaVg",

  authDomain: "avaitior-game.firebaseapp.com",

  databaseURL: "https://avaitior-game-default-rtdb.firebaseio.com",

  projectId: "avaitior-game"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

/* USER */

let currentUser = localStorage.getItem("user") || "";

let balance = 0;

/* AUTO LOGIN */

if(currentUser){

  document.getElementById("loginPage").style.display="none";

  document.getElementById("gamePage").style.display="block";

  loadUser();

}else{

  document.getElementById("loginPage").style.display="block";

}

/* LOGIN */

window.login = ()=>{

  let m = document.getElementById("mobile").value;

  let p = document.getElementById("password").value;

  if(!m || !p){

    alert("Enter Details");

    return;

  }

  currentUser = m;

  localStorage.setItem("user",m);

  get(child(ref(db),'users/'+m)).then((snap)=>{

    // OLD USER

    if(snap.exists()){

      let data = snap.val();

      if(data.password == p){

        document.getElementById("loginPage").style.display="none";

        document.getElementById("gamePage").style.display="block";

        loadUser();

      }else{

        alert("Wrong Password");

      }

    }

    // NEW USER

    else{

      set(ref(db,'users/'+m),{

        password:p,

        balance:0

      }).then(()=>{

        document.getElementById("loginPage").style.display="none";

        document.getElementById("gamePage").style.display="block";

        loadUser();

      });

    }

  });

};

/* LOAD USER */

function loadUser(){

  onValue(ref(db,'users/'+currentUser),(snap)=>{

    if(snap.exists()){

      let data = snap.val();

      balance = Number(data.balance || 0);

      document.getElementById("balance").innerText = balance;

    }

  });

}

/* SAVE BALANCE */

function saveBalance(){

  update(ref(db,'users/'+currentUser),{

    balance:Number(balance)

  });

}

/* LOGOUT */

window.logout = ()=>{

  localStorage.removeItem("user");

  location.reload();

};

/* ========================= */
/* SAME GAME FOR EVERYONE */
/* ========================= */

/* ADMIN GAME LOOP */

let adminLoopStarted = false;

/*
ONLY first user starts loop
*/

function startMainGame(){

  if(adminLoopStarted) return;

  adminLoopStarted = true;

  let multiplier = 1;

  let crashPoint = (Math.random()*5)+1;

  set(ref(db,'game'),{

    multiplier:1,

    running:true,

    crashed:false

  });

  let loop = setInterval(()=>{

    multiplier += 0.10;

    update(ref(db,'game'),{

      multiplier:Number(multiplier.toFixed(2))

    });

    if(multiplier >= crashPoint){

      clearInterval(loop);

      update(ref(db,'game'),{

        crashed:true,

        running:false

      });

      setTimeout(()=>{

        adminLoopStarted=false;

        startMainGame();

      },3000);

    }

  },200);

}

/* START MAIN GAME */

startMainGame();

/* WATCH SAME GAME */

let currentMultiplier = 1;

let crashed = false;

onValue(ref(db,'game'),(snap)=>{

  if(snap.exists()){

    let game = snap.val();

    currentMultiplier = game.multiplier || 1;

    crashed = game.crashed || false;

    document.getElementById("multi").innerText =
    currentMultiplier.toFixed(2)+"x";

    if(crashed){

      document.getElementById("status").innerText =
      "CRASHED";

    }else{

      document.getElementById("status").innerText =
      "";

    }

  }

});

/* BET */

let userBet = 0;

window.placeBet = ()=>{

  let bet = Number(document.getElementById("betAmount").value);

  if(bet<=0){

    alert("Invalid Bet");

    return;

  }

  if(bet>balance){

    alert("Low Balance");

    return;

  }

  if(userBet>0){

    alert("Already Bet");

    return;

  }

  if(crashed){

    alert("Wait Next Round");

    return;

  }

  balance -= bet;

  saveBalance();

  userBet = bet;

};

/* CASHOUT */

window.cashout = ()=>{

  if(userBet<=0){

    alert("No Bet");

    return;

  }

  if(crashed){

    alert("Round Crashed");

    userBet = 0;

    return;

  }

  let win = Math.floor(userBet * currentMultiplier);

  balance += win;

  saveBalance();

  document.getElementById("status").innerText =
  "You Won ₹"+win;

  userBet = 0;

};

</script>

</body>
</html>
