<!DOCTYPE html>
<html>
<head>
<title>Aviator Game</title>

<style>
body { background:#111; color:#fff; text-align:center; font-family:sans-serif; }

.page { display:none; }

#plane {
  position:absolute;
  width:60px;
  left:10px;
  top:250px;
  transition: all 0.2s linear;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="page" style="display:block;">
<h2>Login</h2>
<input id="mobile" placeholder="Mobile"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<!-- GAME -->
<div id="game" class="page">
<h3>Balance: ₹<span id="bal">100</span></h3>

<h1 id="multi">1.00x</h1>

<img id="plane" src="https://i.imgur.com/6QZ6Z6X.png">

<input id="bet" placeholder="Bet"><br>
<button onclick="startGame()">Start</button>
<button onclick="cashout()">Cashout</button><br>

<button onclick="showPage('deposit')">Deposit</button>
<button onclick="showPage('withdraw')">Withdraw</button>

<h4 id="status"></h4>
</div>

<!-- DEPOSIT -->
<div id="deposit" class="page">
<h2>Deposit</h2>
<p>UPI: 7260957661@ybl</p>
<p>Max: 500</p>
<input id="damount" placeholder="Amount"><br>
<input id="utr" placeholder="UTR"><br>
<button onclick="alert('Request sent')">Submit</button><br>
<button onclick="back()">Back</button>
</div>

<!-- WITHDRAW -->
<div id="withdraw" class="page">
<h2>Withdraw</h2>
<p>Max: 500</p>
<input placeholder="Name"><br>
<input placeholder="Bank"><br>
<input placeholder="Account"><br>
<input placeholder="IFSC"><br>
<input id="wamount" placeholder="Amount"><br>
<button onclick="alert('Withdraw request')">Submit</button><br>
<button onclick="back()">Back</button>
</div>

<script>
let currentUser="";
let balance=100;

// LOAD BALANCE
if(localStorage.getItem("balance")){
  balance = Number(localStorage.getItem("balance"));
}
document.getElementById("bal").innerText = balance;

// PAGE SWITCH
function showPage(p){
document.querySelectorAll('.page').forEach(x=>x.style.display='none');
document.getElementById(p).style.display='block';
}
function back(){ showPage('game'); }

// LOGIN
function login(){
let m=mobile.value;
let p=pass.value;

if(!m || !p) return alert("Fill details");

currentUser = m;

// first time user only
if(!localStorage.getItem("user_"+m)){
  localStorage.setItem("user_"+m, JSON.stringify({pass:p, balance:100}));
}else{
  let data = JSON.parse(localStorage.getItem("user_"+m));
  if(data.pass !== p) return alert("Wrong password");
  balance = data.balance;
}

document.getElementById("bal").innerText = balance;
showPage('game');
}

// SAVE
function save(){
localStorage.setItem("user_"+currentUser, JSON.stringify({pass:pass.value, balance:balance}));
}

// GAME
let running=false;
let multi=1;
let crash=0;
let interval;
let x=10;

function startGame(){
let betVal = Number(bet.value);
if(betVal<=0 || betVal>balance) return alert("Invalid Bet");

balance -= betVal;
updateBal();

multi=1;
x=10;
crash = Math.random()*5+1;
running=true;

plane.style.left="10px";
plane.style.top="250px";

interval = setInterval(()=>{
if(!running) return;

multi+=0.05;
x += multi*3;

plane.style.left = x+"px";
plane.style.top = (250 - multi*15)+"px";

multiEl.innerText = multi.toFixed(2)+"x";

if(multi>=crash){
running=false;
clearInterval(interval);

plane.style.transition="all 0.5s";
plane.style.left=(x+200)+"px";
plane.style.top="0px";

status.innerText="💥 Crashed";
save();
}
},100);
}

function cashout(){
if(running){
let betVal = Number(bet.value);
let win = betVal * multi;

balance += win;
running=false;
clearInterval(interval);

status.innerText="✅ Cashed Out ₹"+Math.floor(win);
updateBal();
save();
}
}

function updateBal(){
document.getElementById("bal").innerText = Math.floor(balance);
localStorage.setItem("balance", balance);
}

// AUTO RUN (24/7 feel)
window.onload = ()=>{
setInterval(()=>{
if(!running){
startGame();
}
},3000);
};
</script>

</body>
</html>
