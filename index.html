<!DOCTYPE html>
<html>
<head>
  <title>Realtime Aviator</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:linear-gradient(to bottom,#111,#000);
      color:white;
      text-align:center;
      overflow:hidden;
    }

    .page{
      display:none;
      padding:20px;
    }

    input,button{
      padding:12px;
      margin:5px;
      border:none;
      border-radius:8px;
      font-size:16px;
    }

    input{
      background:#222;
      color:white;
    }

    button{
      background:#ff9800;
      color:white;
      font-weight:bold;
    }

    #topbar{
      background:#000;
      padding:10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    #multi{
      font-size:70px;
      margin-top:100px;
      color:#00ff99;
      text-shadow:0 0 20px #00ff99;
    }

    #status{
      font-size:24px;
      margin-top:20px;
      color:red;
    }

    #timer{
      font-size:28px;
      color:yellow;
      margin-top:10px;
    }

    #plane{
      font-size:50px;
      position:absolute;
      left:20px;
      bottom:120px;
      transition:0.2s linear;
    }
  </style>
</head>

<body>

<!-- SOUND -->

<audio id="bgSound" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8c8a73467.mp3">
</audio>

<audio id="crashSound">
  <source src="https://cdn.pixabay.com/audio/2022/03/10/audio_270f49b4f9.mp3">
</audio>

<!-- LOGIN -->

<div id="loginPage" class="page" style="display:block;">

  <h2>Realtime Aviator</h2>

  <input id="mobile" placeholder="Mobile Number"><br>

  <input id="password" type="password" placeholder="Password"><br>

  <button onclick="login()">Login</button>

</div>

<!-- GAME -->

<div id="gamePage" class="page">

  <div id="topbar">

    <h3>Balance ₹<span id="balance">0</span></h3>

    <button onclick="logout()">Logout</button>

  </div>

  <div id="plane">✈️</div>

  <h1 id="multi">1.00x</h1>

  <div id="timer"></div>

  <input id="betAmount" placeholder="Bet Amount"><br>

  <button onclick="placeBet()">BET</button>

  <button onclick="cashout()">CASHOUT</button>

  <h3 id="status"></h3>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";

import {
  getDatabase,
  ref,
  set,
  get,
  child,
  update,
  onValue
}
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const firebaseConfig = {

  apiKey: "AIzaSyDCYEveGXPy1nORiyyeyIjsbfcqEy4iaVg",

  authDomain: "avaitior-game.firebaseapp.com",

  databaseURL: "https://avaitior-game-default-rtdb.firebaseio.com",

  projectId: "avaitior-game"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

/* USER */

let currentUser = localStorage.getItem("user") || "";

let balance = 0;

/* AUTO LOGIN */

if(currentUser){

  document.getElementById("loginPage").style.display="none";

  document.getElementById("gamePage").style.display="block";

  loadUser();

}else{

  document.getElementById("loginPage").style.display="block";

}

/* LOGIN */

window.login = ()=>{

  document.getElementById("bgSound").play();

  let m = document.getElementById("mobile").value;

  let p = document.getElementById("password").value;

  if(!m || !p){

    alert("Enter Details");

    return;

  }

  currentUser = m;

  localStorage.setItem("user",m);

  get(child(ref(db),'users/'+m)).then((snap)=>{

    if(snap.exists()){

      let data = snap.val();

      if(data.password == p){

        document.getElementById("loginPage").style.display="none";

        document.getElementById("gamePage").style.display="block";

        loadUser();

      }else{

        alert("Wrong Password");

      }

    }else{

      set(ref(db,'users/'+m),{

        password:p,

        balance:0

      }).then(()=>{

        document.getElementById("loginPage").style.display="none";

        document.getElementById("gamePage").style.display="block";

        loadUser();

      });

    }

  });

};

/* LOAD USER */

function loadUser(){

  onValue(ref(db,'users/'+currentUser),(snap)=>{

    if(snap.exists()){

      let data = snap.val();

      balance = Number(data.balance || 0);

      document.getElementById("balance").innerText = balance;

    }

  });

}

/* SAVE BALANCE */

function saveBalance(){

  update(ref(db,'users/'+currentUser),{

    balance:Number(balance)

  });

}

/* LOGOUT */

window.logout = ()=>{

  localStorage.removeItem("user");

  location.reload();

};

/* GAME */

let adminLoopStarted = false;

function startMainGame(){

  if(adminLoopStarted) return;

  adminLoopStarted = true;

  let multiplier = 1;

  let crashPoint = (Math.random()*5)+1;

  set(ref(db,'game'),{

    multiplier:1,

    crashed:false,

    timer:0

  });

  let loop = setInterval(()=>{

    multiplier += 0.10;

    multiplier = Number(multiplier.toFixed(2));

    update(ref(db,'game'),{

      multiplier:multiplier

    });

    if(multiplier >= crashPoint){

      clearInterval(loop);

      document.getElementById("crashSound").play();

      update(ref(db,'game'),{

        crashed:true

      });

      let t = 3;

      update(ref(db,'game'),{

        timer:t

      });

      let timerLoop = setInterval(()=>{

        t--;

        update(ref(db,'game'),{

          timer:t

        });

        if(t<=0){

          clearInterval(timerLoop);

          adminLoopStarted=false;

          startMainGame();

        }

      },1000);

    }

  },200);

}

startMainGame();

/* WATCH GAME */

let currentMultiplier = 1;

let crashed = false;

onValue(ref(db,'game'),(snap)=>{

  if(snap.exists()){

    let game = snap.val();

    currentMultiplier = game.multiplier || 1;

    crashed = game.crashed || false;

    let timer = game.timer || 0;

    document.getElementById("multi").innerText =
    currentMultiplier.toFixed(2)+"x";

    document.getElementById("timer").innerText =
    timer>0 ? "Next Round In "+timer : "";

    /* STOP AFTER CRASH */

    if(crashed){

      document.getElementById("status").innerText =
      "CRASHED";

    }else{

      document.getElementById("status").innerText =
      "";

    }

    /* PLANE MOVE */

    let left = currentMultiplier * 40;

    let bottom = currentMultiplier * 15;

    document.getElementById("plane").style.left =
    left+"px";

    document.getElementById("plane").style.bottom =
    bottom+"px";

  }

});

/* BET */

let userBet = 0;

window.placeBet = ()=>{

  let bet = Number(document.getElementById("betAmount").value);

  if(bet<=0){

    alert("Invalid Bet");

    return;

  }

  if(bet>balance){

    alert("Low Balance");

    return;

  }

  if(userBet>0){

    alert("Already Bet");

    return;

  }

  if(crashed){

    alert("Wait Next Round");

    return;

  }

  balance -= bet;

  saveBalance();

  userBet = bet;

};

/* CASHOUT */

window.cashout = ()=>{

  if(userBet<=0){

    alert("No Bet");

    return;

  }

  if(crashed){

    alert("Round Crashed");

    userBet = 0;

    return;

  }

  let win = Math.floor(userBet * currentMultiplier);

  balance += win;

  saveBalance();

  document.getElementById("status").innerText =
  "You Won ₹"+win;

  userBet = 0;

};

</script>

</body>
</html>
