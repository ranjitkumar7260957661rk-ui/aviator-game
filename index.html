<script>

/* USER */

let currentUser = "";
let balance = 0;

/* GAME */

let currentMultiplier = 1;
let crashed = false;
let gameRunning = false;

let userBet = 0;
let cashedOut = false;

/* IMPORTANT */
/* ROUND LOCK */

let roundBetPlaced = false;

/* AUTO LOGIN */

if(localStorage.getItem("user")){

currentUser = localStorage.getItem("user");

openGame();

}

/* LOGIN */

function login(){

let mobile =
document.getElementById("mobile").value;

let password =
document.getElementById("password").value;

if(!mobile || !password){

alert("Enter Details");

return;

}

currentUser = mobile;

localStorage.setItem("user",mobile);

/* NEW USER */

if(localStorage.getItem("balance_"+mobile)==null){

localStorage.setItem("balance_"+mobile,"0");

}

openGame();

}

/* OPEN GAME */

function openGame(){

document.getElementById("loginPage").style.display="none";

document.getElementById("gamePage").style.display="block";

balance = Number(
localStorage.getItem("balance_"+currentUser)
);

updateBalance();

startGame();

}

/* UPDATE BALANCE */

function updateBalance(){

document.getElementById("balance").innerText = balance;

localStorage.setItem(
"balance_"+currentUser,
balance
);

}

/* START GAME */

function startGame(){

if(gameRunning) return;

gameRunning = true;

crashed = false;

cashedOut = false;

currentMultiplier = 1;

userBet = 0;

/* RESET ROUND LOCK */
/* NEW ROUND */

roundBetPlaced = false;

document.getElementById("status").innerText = "";

document.getElementById("timer").innerText = "";

/* FAST + MID CRASH */

let random = Math.random();

let crashPoint;

/* 60% EARLY */

if(random < 0.60){

crashPoint =
Number((Math.random()*1.5+1.20).toFixed(2));

}

/* 30% MID */

else if(random < 0.90){

crashPoint =
Number((Math.random()*2+2.50).toFixed(2));

}

/* 10% BIG */

else{

crashPoint =
Number((Math.random()*4+5).toFixed(2));

}

/* SLOW X SPEED */

let loop = setInterval(()=>{

currentMultiplier += 0.02;

document.getElementById("multi").innerText =
currentMultiplier.toFixed(2)+"x";

/* CRASH */

if(currentMultiplier >= crashPoint){

clearInterval(loop);

crashed = true;

gameRunning = false;

document.getElementById("status").innerText =
"CRASHED 💥 at "+crashPoint+"x";

/* RESET BET */

userBet = 0;

/* 3 SECOND TIMER */

let t = 3;

document.getElementById("timer").innerText =
"Next Round In "+t;

let timerLoop = setInterval(()=>{

t--;

document.getElementById("timer").innerText =
"Next Round In "+t;

if(t<=0){

clearInterval(timerLoop);

document.getElementById("timer").innerText = "";

startGame();

}

},1000);

}

},170);

}

/* BET */

function placeBet(){

let bet =
Number(document.getElementById("betInput").value);

if(bet<=0){

alert("Invalid Bet");

return;

}

if(bet>balance){

alert("Low Balance");

return;

}

/* ONLY ONE BET PER ROUND */

if(roundBetPlaced){

alert("Already Played This Round");

return;

}

if(crashed){

alert("Wait Next Round");

return;

}

/* PLACE BET */

balance -= bet;

updateBalance();

userBet = bet;

cashedOut = false;

/* LOCK ROUND */

roundBetPlaced = true;

document.getElementById("status").innerText =
"Bet Placed ₹"+bet;

}

/* CASHOUT */

function cashout(){

if(userBet<=0){

alert("No Active Bet");

return;

}

if(cashedOut){

alert("Already Cashed Out");

return;

}

if(crashed){

alert("Round Crashed");

userBet = 0;

return;

}

let win =
Math.floor(userBet * currentMultiplier);

balance += win;

updateBalance();

document.getElementById("status").innerText =
"You Won ₹"+win;

/* STOP MULTIPLE CASHOUT */

cashedOut = true;

/* REMOVE BET */

userBet = 0;

}

/* DEPOSIT */

function openDeposit(){

document.getElementById("depositBox").style.display="block";

}

function submitDeposit(){

let amount =
Number(document.getElementById("depAmount").value);

if(amount < 500){

alert("Minimum Deposit ₹500");

return;

}

alert(
"Deposit Request Sent\nUPI: 7260957661@ybl"
);

closeAll();

}

/* WITHDRAW */

function openWithdraw(){

document.getElementById("withdrawBox").style.display="block";

}

function submitWithdraw(){

let amount =
Number(document.getElementById("wamount").value);

if(amount<=0){

alert("Invalid Amount");

return;

}

alert("Withdraw Request Sent");

closeAll();

}

/* CLOSE */

function closeAll(){

document.getElementById("depositBox").style.display="none";

document.getElementById("withdrawBox").style.display="none";

}

/* LOGOUT */

function logout(){

localStorage.removeItem("user");

location.reload();

}

</script>
