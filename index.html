<!DOCTYPE html>
<html>
<head>
  <title>Aviator Demo</title>
  <style>
    body { background:#111; color:#fff; text-align:center; font-family:Arial; }
    input, button { padding:10px; margin:5px; }
    .page { display:none; }
  </style>
</head>

<body>

<div id="login" class="page" style="display:block;">
  <h2>Login</h2>
  <input id="mobile" placeholder="Mobile"><br>
  <input id="pass" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<div id="game" class="page">
  <h3>Balance: ₹<span id="bal">0</span></h3>
  <h1 id="multi">1.00x</h1>

  <input id="bet" placeholder="Bet"><br>
  <button onclick="startGame()">Start</button>
  <button onclick="cashout()">Cashout</button>

  <h4 id="status"></h4>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, set, get, child, update, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "APNI_REAL_KEY_DAL",
  authDomain: "avaitior-game.firebaseapp.com",
  databaseURL: "https://avaitior-game-default-rtdb.firebaseio.com",
  projectId: "avaitior-game"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentUser = localStorage.getItem("user") || "";
let balance = 0;

function showPage(p){
  document.querySelectorAll('.page').forEach(x=>x.style.display='none');
  document.getElementById(p).style.display='block';
}

// AUTO LOGIN
if(currentUser){
  showPage('game');
  loadUser();
}

window.login = ()=>{
  let m = mobile.value;
  let p = pass.value;

  if(!m || !p) return alert("Fill details");

  currentUser = m;
  localStorage.setItem("user", m);

  get(child(ref(db),'users/'+m)).then(snap=>{
    if(snap.exists()){
      if(snap.val().password === p){
        loadUser();
        showPage('game');
      } else alert("Wrong password");
    } else {
      set(ref(db,'users/'+m),{password:p,balance:100});
      loadUser();
      showPage('game');
    }
  });
};

function loadUser(){
  onValue(ref(db,'users/'+currentUser), snap=>{
    if(snap.exists()){
      balance = snap.val().balance || 0;
      bal.innerText = balance;
    }
  });
}

// GAME
let running=false, multi=1, crash;

window.startGame = ()=>{
  let bet = Number(betInput.value);
  if(bet<=0 || bet>balance) return alert("Invalid");

  balance -= bet;
  save();

  multi=1;
  crash = Math.random()*5+1;
  running=true;
};

function gameLoop(){
  setInterval(()=>{
    if(!running) return;

    multi+=0.1;
    multiEl.innerText = multi.toFixed(2)+"x";

    if(multi>=crash){
      running=false;
      status.innerText="Crashed";
    }
  },100);
}

window.cashout = ()=>{
  if(!running) return;

  let bet = Number(betInput.value);
  let win = bet * multi;

  balance += win;
  save();

  running=false;
  status.innerText="Win ₹"+Math.floor(win);
};

function save(){
  update(ref(db,'users/'+currentUser),{balance:balance});
}

window.onload = ()=>{
  gameLoop();
};
</script>

</body>
</html>
