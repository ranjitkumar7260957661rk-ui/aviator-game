<!DOCTYPE html>
<html>
<head>
  <title>Aviator Full</title>
  <style>
    body { font-family: Arial; text-align:center; background:#111; color:#fff; }
    input, button { padding:10px; margin:5px; }
    .page { display:none; }
  </style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="login" class="page" style="display:block;">
  <h2>Login</h2>
  <input id="mobile" placeholder="Mobile Number"><br>
  <input id="pass" placeholder="Password" type="password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- GAME PAGE -->
<div id="game" class="page">
  <h2>Balance: ₹<span id="bal">100</span></h2>
  <h1 id="multi">1.00x</h1>

  <input id="bet" placeholder="Enter Bet"><br>
  <button onclick="startGame()">Start</button>
  <button onclick="cashout()">Cashout</button><br>

  <button onclick="openDeposit()">Deposit</button>
  <button onclick="openWithdraw()">Withdraw</button>
</div>

<!-- DEPOSIT PAGE -->
<div id="deposit" class="page">
  <h2>Deposit</h2>
  <p>Send money to UPI:</p>
  <h3>yourupi@upi</h3>
  <p>After payment, click below:</p>
  <button onclick="alert('Wait for admin approval')">I Paid</button><br>
  <button onclick="back()">Back</button>
</div>

<!-- WITHDRAW PAGE -->
<div id="withdraw" class="page">
  <h2>Withdraw</h2>
  <input id="wamount" placeholder="Amount"><br>
  <button onclick="withdraw()">Request Withdraw</button><br>
  <button onclick="back()">Back</button>
</div>

<script>
let balance = 100;
let running = false;
let multi = 1;
let interval;
let crash;

// PAGE SWITCH
function show(page){
  document.querySelectorAll('.page').forEach(p=>p.style.display='none');
  document.getElementById(page).style.display='block';
}

// LOGIN
function login(){
  let m = document.getElementById("mobile").value;
  let p = document.getElementById("pass").value;

  if(m && p){
    localStorage.setItem("user", m);
    show("game");
  } else {
    alert("Enter details");
  }
}

// GAME
function startGame(){
  let bet = Number(document.getElementById("bet").value);
  if(bet<=0 || bet>balance) return alert("Invalid Bet");

  balance -= bet;
  document.getElementById("bal").innerText = balance;

  multi = 1;
  crash = Math.random()*5 + 1;
  running = true;

  interval = setInterval(()=>{
    if(!running) return;

    multi += 0.1;
    document.getElementById("multi").innerText = multi.toFixed(2)+"x";

    if(multi >= crash){
      running = false;
      clearInterval(interval);
      alert("Crashed!");
    }
  },200);
}

function cashout(){
  if(running){
    let bet = Number(document.getElementById("bet").value);
    let win = bet * multi;
    balance += win;
    document.getElementById("bal").innerText = Math.floor(balance);
    running = false;
    clearInterval(interval);
  }
}

// NAVIGATION
function openDeposit(){ show("deposit"); }
function openWithdraw(){ show("withdraw"); }
function back(){ show("game"); }

// WITHDRAW
function withdraw(){
  let amt = Number(document.getElementById("wamount").value);
  if(amt>balance) return alert("Not enough balance");

  balance -= amt;
  document.getElementById("bal").innerText = balance;
  alert("Withdraw request sent (manual)");
}
</script>

</body>
</html>
