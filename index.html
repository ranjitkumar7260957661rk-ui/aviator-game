<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aviator Game</title>

<style>

body{
margin:0;
padding:0;
background:#111;
font-family:Arial;
color:white;
text-align:center;
}

#topbar{
background:#000;
padding:15px;
font-size:25px;
font-weight:bold;
}

#multi{
font-size:80px;
color:#00ff99;
margin-top:80px;
}

#betTimer{
font-size:25px;
color:yellow;
margin-top:10px;
}

#timer{
font-size:22px;
color:#00bcd4;
margin-top:10px;
}

input{
width:220px;
padding:12px;
border:none;
border-radius:8px;
margin-top:15px;
font-size:18px;
}

button{
padding:12px 20px;
margin:8px;
border:none;
border-radius:8px;
background:#00bcd4;
color:white;
font-size:18px;
font-weight:bold;
}

#status{
margin-top:20px;
font-size:28px;
}

.popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#222;
padding:20px;
border-radius:10px;
width:300px;
z-index:1000;
}

</style>
</head>

<body>

<div id="topbar">
Balance ₹<span id="balance">0</span>
</div>

<h1 id="multi">1.00x</h1>

<div id="betTimer">Bet Time: 5</div>

<div id="timer"></div>

<input type="number" id="betAmount" placeholder="Bet Amount"><br>

<button onclick="placeBet()">BET</button>

<button onclick="cashout()">CASHOUT</button>

<h2 id="status"></h2>

<br><br>

<button onclick="openDeposit()">Deposit</button>

<button onclick="openWithdraw()">Withdraw</button>

<button onclick="logout()">Logout</button>

<!-- DEPOSIT -->

<div id="depositBox" class="popup">

<h2>Deposit</h2>

<p>Minimum ₹500</p>

<p>UPI: 7260957661@ybl</p>

<input type="number" id="depAmount" placeholder="Amount"><br>

<input id="utr" placeholder="UTR Number"><br>

<button onclick="submitDeposit()">Submit</button>

<button onclick="closeAll()">Close</button>

</div>

<!-- WITHDRAW -->

<div id="withdrawBox" class="popup">

<h2>Withdraw</h2>

<p>Minimum ₹500</p>

<input id="wname" placeholder="Name"><br>

<input id="bank" placeholder="Bank Name"><br>

<input id="acc" placeholder="Account Number"><br>

<input id="ifsc" placeholder="IFSC"><br>

<input type="number" id="wamount" placeholder="Amount"><br>

<button onclick="submitWithdraw()">Submit</button>

<button onclick="closeAll()">Close</button>

</div>

<script>

let balance = 0;
let multiplier = 1;
let crashed = false;
let userBet = 0;
let betClosed = false;
let cashedOut = false;

document.getElementById("balance").innerText = balance;

/* FIXED CRASH LIST */

let crashList = [
1,2,200,1,50,2,1,3,5,1,
5,3,1,10,1,29,45,1,7,4,
7,1,1,1,9,1,1,5,4,45,
80,1,20,45,1,4,5,9,1,20,
1,22,1,1,24,26,1,100,1,400,
3680,548,1,200,600,5890,20,40,
1,1,800,1,1000,580,856
];

let crashIndex = 0;

function nextCrash(){

let value = crashList[crashIndex];

crashIndex++;

if(crashIndex >= crashList.length){
crashIndex = 0;
}

return value;

}

/* START ROUND */

function startRound(){

multiplier = 1;
crashed = false;
userBet = 0;
cashedOut = false;
betClosed = false;

document.getElementById("multi").innerText = "1.00x";
document.getElementById("status").innerText = "";

let betTime = 5;

document.getElementById("betTimer").innerText =
"Bet Time: " + betTime;

let betLoop = setInterval(function(){

betTime--;

document.getElementById("betTimer").innerText =
"Bet Time: " + betTime;

if(betTime <= 0){

clearInterval(betLoop);

betClosed = true;

document.getElementById("betTimer").innerText =
"BET CLOSED";

startFlying();

}

},1000);

}

/* START FLYING */

function startFlying(){

let crashPoint = nextCrash();

let flyLoop = setInterval(function(){

if(crashed){

clearInterval(flyLoop);
return;

}

multiplier += 0.02;

document.getElementById("multi").innerText =
multiplier.toFixed(2) + "x";

if(multiplier >= crashPoint){

crashed = true;

clearInterval(flyLoop);

document.getElementById("status").innerText =
"CRASHED 💥 at " + crashPoint + "x";

let t = 3;

document.getElementById("timer").innerText =
"Next Round In " + t;

let timerLoop = setInterval(function(){

t--;

document.getElementById("timer").innerText =
"Next Round In " + t;

if(t <= 0){

clearInterval(timerLoop);

document.getElementById("timer").innerText = "";

startRound();

}

},1000);

}

},150);

}

startRound();

/* BET */

function placeBet(){

let bet =
Number(document.getElementById("betAmount").value);

if(betClosed){

alert("Bet Closed");

return;

}

if(bet <= 0){

alert("Invalid Bet");

return;

}

if(bet > balance){

alert("Low Balance");

return;

}

if(userBet > 0){

alert("Already Bet");

return;

}

balance -= bet;

document.getElementById("balance").innerText = balance;

userBet = bet;

document.getElementById("status").innerText =
"Bet Placed ₹" + bet;

}

/* CASHOUT */

function cashout(){

if(userBet <= 0){

alert("No Bet");

return;

}

if(cashedOut){

alert("Already Cashed Out");

return;

}

if(crashed){

alert("Round Crashed");

return;

}

let win = Math.floor(userBet * multiplier);

balance += win;

document.getElementById("balance").innerText = balance;

document.getElementById("status").innerText =
"You Won ₹" + win;

cashedOut = true;

userBet = 0;

}

/* DEPOSIT */

function openDeposit(){

document.getElementById("depositBox").style.display =
"block";

}

function submitDeposit(){

let amount =
Number(document.getElementById("depAmount").value);

if(amount < 500){

alert("Minimum Deposit ₹500");

return;

}

alert("Deposit Request Sent\nUPI: 7260957661@ybl");

closeAll();

}

/* WITHDRAW */

function openWithdraw(){

document.getElementById("withdrawBox").style.display =
"block";

}

function submitWithdraw(){

let amount =
Number(document.getElementById("wamount").value);

if(amount < 500){

alert("Minimum Withdraw ₹500");

return;

}

alert("Withdraw Request Sent");

closeAll();

}

/* CLOSE */

function closeAll(){

document.getElementById("depositBox").style.display =
"none";

document.getElementById("withdrawBox").style.display =
"none";

}

/* LOGOUT */

function logout(){

location.reload();

}

</script>

</body>
</html>
