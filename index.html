<!DOCTYPE html>
<html>
<head>
<title>Aviator</title>

<style>
body { background:#111; color:#fff; text-align:center; font-family:sans-serif; }

input, button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:5px;
}

button {
  background:#00ffcc;
  color:#000;
  font-weight:bold;
}

#plane {
  font-size:50px;
  margin:20px;
  transition: transform 0.1s linear;
}
</style>

</head>
<body>

<h2>Aviator ✈️</h2>

<!-- LOGIN -->
<div id="login">
  <input id="mobile" placeholder="Mobile"><br>
  <input id="pass" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- GAME -->
<div id="game" style="display:none;">
  <h3>Total Balance: ₹<span id="bal">0</span></h3>

  <button onclick="showDeposit()">Deposit</button>
  <button onclick="showWithdraw()">Withdraw</button>

  <div id="plane">✈️</div>
  <h1 id="multi">1.00x</h1>

  <input id="bet" placeholder="Bet Amount"><br>
  <button onclick="startBet()">Start</button>
  <button onclick="cashout()">Cashout</button>
</div>

<!-- DEPOSIT -->
<div id="deposit" style="display:none;">
  <h3>Deposit</h3>
  <p>UPI: 7260957661@ybl</p>
  <p>Max ₹500</p>
  <input id="depAmt" placeholder="Amount">
  <button onclick="sendDeposit()">Submit</button>
  <button onclick="backGame()">Back</button>
</div>

<!-- WITHDRAW -->
<div id="withdraw" style="display:none;">
  <h3>Withdraw</h3>
  <p>Max ₹500 (Only real balance)</p>
  <input id="name" placeholder="Name"><br>
  <input id="acc" placeholder="Account Number"><br>
  <input id="ifsc" placeholder="IFSC"><br>
  <input id="withAmt" placeholder="Amount"><br>
  <button onclick="sendWithdraw()">Submit</button>
  <button onclick="backGame()">Back</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update, push } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const app = initializeApp({
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_PROJECT"
});

const db = getDatabase(app);

let user = "";
let balance = 0;   // real money
let bonus = 0;     // free ₹100
let multiplier = 1;
let running = false;
let betAmt = 0;

// LOGIN
window.login = async function() {
  user = document.getElementById("mobile").value;

  let snap = await get(ref(db, "users/" + user));

  if (!snap.exists()) {
    balance = 0;
    bonus = 100;

    await set(ref(db, "users/" + user), {
      balance,
      bonus
    });

  } else {
    let data = snap.val();
    balance = Number(data.balance || 0);
    bonus = Number(data.bonus || 0);
  }

  updateBalance();

  document.getElementById("login").style.display="none";
  document.getElementById("game").style.display="block";
}

// SHOW BALANCE
function updateBalance(){
  let total = balance + bonus;
  document.getElementById("bal").innerText = total.toFixed(2);
}

// START BET
window.startBet = function() {

  if (running) return;

  betAmt = Number(document.getElementById("bet").value);

  if (!betAmt || betAmt <= 0 || betAmt > (balance + bonus)) {
    alert("Invalid Bet");
    return;
  }

  // first use bonus
  if (bonus >= betAmt) {
    bonus -= betAmt;
  } else {
    let remain = betAmt - bonus;
    bonus = 0;
    balance -= remain;
  }

  saveUser();
  updateBalance();

  startGame();
}

// GAME
function startGame() {
  running = true;
  multiplier = 1;

  let crash = Math.random() * 5 + 1;

  let plane = document.getElementById("plane");
  plane.innerText = "✈️";

  let interval = setInterval(()=>{
    multiplier += 0.05;

    document.getElementById("multi").innerText = multiplier.toFixed(2) + "x";
    plane.style.transform = "translateY(-" + (multiplier*10) + "px)";

    if (multiplier >= crash) {
      clearInterval(interval);
      running = false;
      plane.innerText = "💥";

      setTimeout(()=>{
        plane.style.transform = "translateY(0px)";
        document.getElementById("multi").innerText = "1.00x";
      },2000);
    }

  },100);
}

// CASHOUT
window.cashout = function() {

  if (!running) return;

  let win = betAmt * multiplier;

  balance += win; // only real balance increase

  saveUser();
  updateBalance();

  running = false;
}

// SAVE USER
function saveUser(){
  update(ref(db, "users/" + user), {
    balance,
    bonus
  });
}

// UI
window.showDeposit = ()=>{
  document.getElementById("game").style.display="none";
  document.getElementById("deposit").style.display="block";
}

window.showWithdraw = ()=>{
  document.getElementById("game").style.display="none";
  document.getElementById("withdraw").style.display="block";
}

window.backGame = ()=>{
  document.getElementById("deposit").style.display="none";
  document.getElementById("withdraw").style.display="none";
  document.getElementById("game").style.display="block";
}

// DEPOSIT
window.sendDeposit = ()=>{
  let amt = Number(document.getElementById("depAmt").value);

  if (!amt || amt <=0 || amt > 500) {
    alert("Max ₹500");
    return;
  }

  push(ref(db,"deposit"), { user, amt, status:"pending" });

  alert("Deposit Request Sent");
}

// WITHDRAW
window.sendWithdraw = ()=>{

  let amt = Number(document.getElementById("withAmt").value);

  if (!amt || amt <=0 || amt > 500) {
    alert("Max ₹500");
    return;
  }

  if (amt > balance) {
    alert("Only real balance withdraw allowed");
    return;
  }

  push(ref(db,"withdraw"), {
    user,
    amt,
    name: document.getElementById("name").value,
    acc: document.getElementById("acc").value,
    ifsc: document.getElementById("ifsc").value,
    status:"pending"
  });

  alert("Withdraw Request Sent");
}

</script>

</body>
</html>
