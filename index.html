<!DOCTYPE html>
<html>
<head>
  <title>Realtime Aviator</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#111;
      color:white;
      text-align:center;
      overflow:hidden;
    }

    .page{
      display:none;
      padding:20px;
    }

    input,button{
      padding:12px;
      margin:5px;
      border:none;
      border-radius:8px;
      font-size:16px;
    }

    input{
      background:#222;
      color:white;
    }

    button{
      background:#ff9800;
      color:white;
      font-weight:bold;
    }

    #topbar{
      background:#000;
      padding:10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    #multi{
      font-size:70px;
      margin-top:100px;
      color:#00ff99;
      text-shadow:0 0 20px #00ff99;
    }

    #status{
      font-size:24px;
      margin-top:20px;
      color:red;
    }

    #timer{
      font-size:28px;
      color:yellow;
      margin-top:10px;
    }

    #plane{
      font-size:50px;
      position:absolute;
      left:20px;
      bottom:120px;
      transition:0.2s linear;
    }

    #menu{
      position:fixed;
      top:0;
      left:-220px;
      width:200px;
      height:100%;
      background:#222;
      transition:0.3s;
      padding-top:40px;
      z-index:1000;
    }

    #menu button{
      width:90%;
    }

    .popup{
      display:none;
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      background:#222;
      padding:20px;
      border-radius:10px;
      width:300px;
      z-index:2000;
    }
  </style>
</head>

<body>

<!-- SOUND -->

<audio id="bgSound" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8c8a73467.mp3">
</audio>

<audio id="crashSound">
  <source src="https://cdn.pixabay.com/audio/2022/03/10/audio_270f49b4f9.mp3">
</audio>

<!-- LOGIN -->

<div id="loginPage" class="page" style="display:block;">

  <h2>Realtime Aviator</h2>

  <input id="mobile" placeholder="Mobile Number"><br>

  <input id="password" type="password" placeholder="Password"><br>

  <button onclick="login()">Login</button>

</div>

<!-- GAME -->

<div id="gamePage" class="page">

  <div id="topbar">

    <button onclick="openMenu()">☰</button>

    <h3>Balance ₹<span id="balance">0</span></h3>

  </div>

  <div id="plane">✈️</div>

  <h1 id="multi">1.00x</h1>

  <div id="timer"></div>

  <input id="betAmount" placeholder="Bet Amount"><br>

  <button onclick="placeBet()">BET</button>

  <button onclick="cashout()">CASHOUT</button>

  <h3 id="status"></h3>

</div>

<!-- MENU -->

<div id="menu">

  <button onclick="showDeposit()">Deposit</button>

  <button onclick="showWithdraw()">Withdraw</button>

  <button onclick="logout()">Logout</button>

</div>

<!-- DEPOSIT -->

<div id="depositBox" class="popup">

  <h2>Deposit</h2>

  <p>Minimum ₹500</p>

  <p>UPI: 7260957661@ybl</p>

  <input id="depAmount" placeholder="Amount"><br>

  <input id="utr" placeholder="UTR Number"><br>

  <button onclick="submitDeposit()">Submit</button>

  <button onclick="closeAll()">Close</button>

</div>

<!-- WITHDRAW -->

<div id="withdrawBox" class="popup">

  <h2>Withdraw</h2>

  <p>Minimum ₹500</p>

  <input id="wname" placeholder="Name"><br>

  <input id="bank" placeholder="Bank Name"><br>

  <input id="acc" placeholder="Account Number"><br>

  <input id="ifsc" placeholder="IFSC"><br>

  <input id="wamount" placeholder="Amount"><br>

  <button onclick="submitWithdraw()">Submit</button>

  <button onclick="closeAll()">Close</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";

import {
  getDatabase,
  ref,
  set,
  get,
  child,
  update,
  push,
  onValue
}
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const firebaseConfig = {

  apiKey: "YOUR_API_KEY",

  authDomain: "avaitior-game.firebaseapp.com",

  databaseURL: "https://avaitior-game-default-rtdb.firebaseio.com",

  projectId: "avaitior-game"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

/* USER */

let currentUser = localStorage.getItem("user") || "";

let balance = 0;

/* AUTO LOGIN */

if(currentUser){

  document.getElementById("loginPage").style.display="none";

  document.getElementById("gamePage").style.display="block";

  loadUser();

}else{

  document.getElementById("loginPage").style.display="block";

}

/* LOGIN */

window.login = ()=>{

  document.getElementById("bgSound").play();

  let m = document.getElementById("mobile").value;

  let p = document.getElementById("password").value;

  if(!m || !p){

    alert("Enter Details");

    return;

  }

  currentUser = m;

  localStorage.setItem("user",m);

  get(child(ref(db),'users/'+m)).then((snap)=>{

    if(snap.exists()){

      let data = snap.val();

      if(data.password == p){

        document.getElementById("loginPage").style.display="none";

        document.getElementById("gamePage").style.display="block";

        loadUser();

      }else{

        alert("Wrong Password");

      }

    }else{

      set(ref(db,'users/'+m),{

        password:p,

        balance:0

      }).then(()=>{

        document.getElementById("loginPage").style.display="none";

        document.getElementById("gamePage").style.display="block";

        loadUser();

      });

    }

  });

};

/* LOAD USER */

function loadUser(){

  onValue(ref(db,'users/'+currentUser),(snap)=>{

    if(snap.exists()){

      let data = snap.val();

      balance = Number(data.balance || 0);

      document.getElementById("balance").innerText = balance;

    }

  });

}

/* SAVE BALANCE */

function saveBalance(){

  update(ref(db,'users/'+currentUser),{

    balance:Number(balance)

  });

}

/* MENU */

window.openMenu = ()=>{

  let menu = document.getElementById("menu");

  if(menu.style.left=="0px"){

    menu.style.left="-220px";

  }else{

    menu.style.left="0px";

  }

};

window.closeAll = ()=>{

  document.getElementById("menu").style.left="-220px";

  document.getElementById("depositBox").style.display="none";

  document.getElementById("withdrawBox").style.display="none";

};

window.showDeposit = ()=>{

  document.getElementById("depositBox").style.display="block";

};

window.showWithdraw = ()=>{

  document.getElementById("withdrawBox").style.display="block";

};

/* LOGOUT */

window.logout = ()=>{

  localStorage.removeItem("user");

  location.reload();

};

/* GAME */

let adminLoopStarted = false;

function startMainGame(){

  if(adminLoopStarted) return;

  adminLoopStarted = true;

  let multiplier = 1;

  let crashPoint = (Math.random()*5)+1;

  set(ref(db,'game'),{

    multiplier:1,

    crashed:false,

    timer:0

  });

  let loop = setInterval(()=>{

    multiplier += 0.10;

    multiplier = Number(multiplier.toFixed(2));

    if(multiplier >= crashPoint){

      clearInterval(loop);

      multiplier = crashPoint;

      update(ref(db,'game'),{

        multiplier:multiplier,

        crashed:true

      });

      document.getElementById("crashSound").play();

      let t = 3;

      update(ref(db,'game'),{

        timer:t

      });

      let timerLoop = setInterval(()=>{

        t--;

        update(ref(db,'game'),{

          timer:t

        });

        if(t<=0){

          clearInterval(timerLoop);

          adminLoopStarted=false;

          startMainGame();

        }

      },1000);

      return;

    }

    update(ref(db,'game'),{

      multiplier:multiplier

    });

  },200);

}

startMainGame();

/* WATCH GAME */

let currentMultiplier = 1;

let crashed = false;

onValue(ref(db,'game'),(snap)=>{

  if(snap.exists()){

    let game = snap.val();

    currentMultiplier = game.multiplier || 1;

    crashed = game.crashed || false;

    let timer = game.timer || 0;

    document.getElementById("multi").innerText =
    currentMultiplier.toFixed(2)+"x";

    document.getElementById("timer").innerText =
    timer>0 ? "Next Round In "+timer : "";

    if(crashed){

      document.getElementById("status").innerText =
      "CRASHED";

    }else{

      document.getElementById("status").innerText =
      "";

    }

    let left = currentMultiplier * 40;

    let bottom = currentMultiplier * 15;

    document.getElementById("plane").style.left =
    left+"px";

    document.getElementById("plane").style.bottom =
    bottom+"px";

  }

});

/* BET */

let userBet = 0;

window.placeBet = ()=>{

  let bet = Number(document.getElementById("betAmount").value);

  if(bet<=0){

    alert("Invalid Bet");

    return;

  }

  if(bet>balance){

    alert("Low Balance");

    return;

  }

  if(userBet>0){

    alert("Already Bet");

    return;

  }

  if(crashed){

    alert("Wait Next Round");

    return;

  }

  balance -= bet;

  saveBalance();

  userBet = bet;

};

/* CASHOUT */

window.cashout = ()=>{

  if(userBet<=0){

    alert("No Bet");

    return;

  }

  if(crashed){

    alert("Round Crashed");

    userBet = 0;

    return;

  }

  let win = Math.floor(userBet * currentMultiplier);

  balance += win;

  saveBalance();

  document.getElementById("status").innerText =
  "You Won ₹"+win;

  userBet = 0;

};

/* DEPOSIT */

window.submitDeposit = ()=>{

  let amount = document.getElementById("depAmount").value;

  let utr = document.getElementById("utr").value;

  push(ref(db,'deposits'),{

    user:currentUser,

    amount:Number(amount),

    utr:utr,

    status:"pending"

  });

  alert("Deposit Request Sent");

  closeAll();

};

/* WITHDRAW */

window.submitWithdraw = ()=>{

  let name = document.getElementById("wname").value;

  let bank = document.getElementById("bank").value;

  let acc = document.getElementById("acc").value;

  let ifsc = document.getElementById("ifsc").value;

  let amount = document.getElementById("wamount").value;

  push(ref(db,'withdraws'),{

    user:currentUser,

    name:name,

    bank:bank,

    account:acc,

    ifsc:ifsc,

    amount:Number(amount),

    status:"pending"

  });

  alert("Withdraw Request Sent");

  closeAll();

};

</script>

</body>
</html>
