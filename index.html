<!DOCTYPE html>
<html>
<head>
  <title>Aviator Demo</title>
  <style>
    body { font-family: Arial; background:#111; color:#fff; text-align:center; }
    input, button { padding:10px; margin:5px; }
    .page { display:none; }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="page" style="display:block;">
  <h2>Login</h2>
  <input id="mobile" placeholder="Mobile"><br>
  <input id="pass" placeholder="Password" type="password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- GAME -->
<div id="game" class="page">
  <h3>Balance: ₹<span id="bal">0</span></h3>
  <h1 id="multi">1.00x</h1>

  <input id="bet" placeholder="Bet"><br>
  <button onclick="betGame()">Place Bet</button>
  <button onclick="cashout()">Cashout</button>

  <h4 id="status"></h4>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, set, get, child, update, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDCYEveGXPy1nORiyyeyIjsbfcqEy4iaVg",
  authDomain: "avaitior-game.firebaseapp.com",
  databaseURL: "https://avaitior-game-default-rtdb.firebaseio.com",
  projectId: "avaitior-game"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
// ELEMENTS
let multiEl = document.getElementById("multi");
let statusEl = document.getElementById("status");
let balEl = document.getElementById("bal");

// DATA
let currentUser = localStorage.getItem("user") || "";
let balance = 0;

// PAGE SWITCH
function showPage(p){
  document.querySelectorAll('.page').forEach(x=>x.style.display='none');
  document.getElementById(p).style.display='block';
}

// AUTO LOGIN
if(currentUser){
  showPage('game');
  loadUser();
}else{
  showPage('login');
}

// LOGIN
window.login = ()=>{
  let m = document.getElementById("mobile").value;
  let p = document.getElementById("pass").value;

  if(!m || !p) return alert("Enter details");

  currentUser = m;
  localStorage.setItem("user", m);

  get(child(ref(db), 'users/'+m)).then(snap=>{
    if(snap.exists()){
      if(snap.val().password === p){
        loadUser();
        showPage('game');
      } else alert("Wrong password");
    } else {
      set(ref(db,'users/'+m),{password:p,balance:1000});
      loadUser();
      showPage('game');
    }
  });
};

// LOAD USER (REALTIME)
function loadUser(){
  onValue(ref(db,'users/'+currentUser), snap=>{
    if(snap.exists()){
      balance = snap.val().balance || 0;
      balEl.innerText = balance;
    }
  });
}

// GAME LOOP (24/7)
let multi = 1;
let crash = 2;
let running = false;
let userBet = 0;

function startRound(){
  multi = 1;
  crash = Math.random()*5 + 1;
  running = true;
  statusEl.innerText = "";

  let interval = setInterval(()=>{
    if(!running) return;

    multi += 0.1;
    multiEl.innerText = multi.toFixed(2) + "x";

    if(multi >= crash){
      running = false;
      clearInterval(interval);
      statusEl.innerText = "Crashed!";
      userBet = 0;

      setTimeout(startRound, 2000); // auto next round
    }
  },200);
}

// AUTO START
startRound();

// BET
window.betGame = ()=>{
  let b = Number(document.getElementById("bet").value);
  if(b<=0 || b>balance) return alert("Invalid");

  if(running && userBet === 0){
    userBet = b;
    balance -= b;
    balEl.innerText = balance;
    saveBalance();
  }
};

// CASHOUT
window.cashout = ()=>{
  if(running && userBet > 0){
    let win = userBet * multi;
    balance += Math.floor(win);
    balEl.innerText = balance;
    saveBalance();
    userBet = 0;
    statusEl.innerText = "You Win!";
  }
};

// SAVE
function saveBalance(){
  update(ref(db,'users/'+currentUser),{
    balance: balance
  });
}
</script>

</body>
</html>
