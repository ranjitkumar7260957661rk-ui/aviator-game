<!DOCTYPE html>
<html>
<head>
<title>Aviator Final</title>

<style>
body { background:#111; color:#fff; text-align:center; font-family:sans-serif; }

input, button {
  padding:10px; margin:5px;
}

#game, #depositPage, #withdrawPage { display:none; }

#plane {
  font-size:40px;
  position:relative;
  left:0;
}
</style>
</head>

<body>

<h2>Login</h2>

<div id="login">
  <input id="mobile" placeholder="Mobile"><br>
  <input id="pass" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<div id="game">
  <h3>Balance: ₹<span id="bal">0</span></h3>

  <button onclick="showDeposit()">Deposit</button>
  <button onclick="showWithdraw()">Withdraw</button>

  <h1 id="plane">✈️</h1>
  <h1 id="multi">1.00x</h1>

  <input id="bet" placeholder="Bet"><br>
  <button onclick="cashout()">Cashout</button>
</div>

<div id="depositPage">
  <h3>UPI: 7260957661@ybl</h3>
  <p>Max ₹500</p>
  <input id="depAmt" placeholder="Amount">
  <input id="utr" placeholder="UTR">
  <button onclick="deposit()">Submit</button>
  <button onclick="back()">Back</button>
</div>

<div id="withdrawPage">
  <input id="bank" placeholder="Bank Name">
  <input id="acc" placeholder="Account No">
  <input id="ifsc" placeholder="IFSC">
  <input id="wAmt" placeholder="Amount (max 500)">
  <button onclick="withdraw()">Submit</button>
  <button onclick="back()">Back</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDCYEveGXPy1nORiyyeyIjsbfcqEy4iaVg",
  authDomain: "avaitior-game.firebaseapp.com",
  databaseURL: "https://avaitior-game-default-rtdb.firebaseio.com",
  projectId: "avaitior-game"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let user="";
let balance=0;
let multi=1;
let running=false;
let bet=0;

// LOGIN
window.login = async function(){
  user = document.getElementById("mobile").value;
  let pass = document.getElementById("pass").value;

  if(!user || !pass) return alert("Fill details");

  const snapshot = await get(child(ref(db), "users/"+user));

  if(snapshot.exists()){
    balance = Number(snapshot.val().balance) || 0;
  } else {
    balance = 100;
    await set(ref(db,"users/"+user), {balance: balance});
  }

  document.getElementById("bal").innerText = balance;

  document.getElementById("login").style.display="none";
  document.getElementById("game").style.display="block";

  startRound();
}

// GAME AUTO ROUND
function startRound(){
  multi = 1;
  running = true;
  bet = Number(document.getElementById("bet").value) || 0;

  let pos = 0;
  document.getElementById("plane").style.left="0px";

  let interval = setInterval(()=>{
    multi += 0.05;
    pos += 4;

    document.getElementById("multi").innerText = multi.toFixed(2)+"x";
    document.getElementById("plane").style.left = pos+"px";

    if(Math.random() < 0.03){
      clearInterval(interval);
      running=false;

      document.getElementById("multi").innerText = "💥 "+multi.toFixed(2);

      setTimeout(startRound,3000);
    }

  },100);
}

// CASHOUT
window.cashout = function(){
  if(!running) return;

  running=false;

  let b = Number(document.getElementById("bet").value);

  if(isNaN(b) || b<=0) return alert("Enter bet first");

  if(b > balance) return alert("Low balance");

  let win = b * multi;

  balance += win;

  updateBal();

  alert("Won ₹"+win.toFixed(0));
}

// UPDATE BALANCE
function updateBal(){
  document.getElementById("bal").innerText = balance;
  set(ref(db,"users/"+user+"/balance"), balance);
}

// PAGES
window.showDeposit = ()=>{
  document.getElementById("game").style.display="none";
  document.getElementById("depositPage").style.display="block";
}

window.showWithdraw = ()=>{
  document.getElementById("game").style.display="none";
  document.getElementById("withdrawPage").style.display="block";
}

window.back = ()=>{
  document.getElementById("depositPage").style.display="none";
  document.getElementById("withdrawPage").style.display="none";
  document.getElementById("game").style.display="block";
}

// DEPOSIT
window.deposit = ()=>{
  let amt = document.getElementById("depAmt").value;
  let utr = document.getElementById("utr").value;

  if(!amt || !utr) return alert("Fill all");

  alert("Deposit request saved (manual check)");
}
