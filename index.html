<!DOCTYPE html>
<html>
<head>
  <title>Aviator Full System</title>
  <style>
    body { font-family: Arial; background:#111; color:#fff; text-align:center; }
    input, button { padding:10px; margin:5px; border-radius:8px; border:none; }
    button { background:red; color:white; font-weight:bold; }
    .page { display:none; }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="page" style="display:block;">
  <h2>Login</h2>
  <input id="mobile" placeholder="Mobile"><br>
  <input id="pass" placeholder="Password" type="password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- GAME -->
<div id="game" class="page">
  <h3>Balance: ₹<span id="bal">0</span></h3>
  <h1 id="multi">1.00x</h1>

  <input id="bet" placeholder="Bet"><br>
  <button onclick="startGame()">Start</button>
  <button onclick="cashout()">Cashout</button><br>

  <button onclick="showPage('deposit')">Deposit</button>
  <button onclick="showPage('withdraw')">Withdraw</button>

  <h4 id="status"></h4>
</div>

<!-- DEPOSIT -->
<div id="deposit" class="page">
  <h2>Deposit</h2>
  <p>UPI: 7260957661@ybl</p>
  <p>Max Deposit: ₹500</p>
  <input id="damount" placeholder="Amount"><br>
  <input id="utr" placeholder="UTR Number"><br>
  <button onclick="deposit()">Submit</button><br>
  <button onclick="back()">Back</button>
</div>

<!-- WITHDRAW -->
<div id="withdraw" class="page">
  <h2>Withdraw</h2>
  <p>Max Withdraw: ₹500</p>
  <input id="name" placeholder="Name"><br>
  <input id="acc" placeholder="Account Number"><br>
  <input id="ifsc" placeholder="IFSC"><br>
  <input id="wamount" placeholder="Amount"><br>
  <button onclick="withdraw()">Submit</button><br>
  <button onclick="back()">Back</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, set, get, child, update, push } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDCYEveGXPy1nORiyyeyIjsbfcqEy4iaVg",
  authDomain: "avaitior-game.firebaseapp.com",
  databaseURL: "https://avaitior-game-default-rtdb.firebaseio.com",
  projectId: "avaitior-game"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentUser = "";
let balance = 0;
let running=false, multi=1, crash, betAmt=0;

// PAGE SWITCH
window.showPage = (p)=>{
  document.querySelectorAll('.page').forEach(x=>x.style.display='none');
  document.getElementById(p).style.display='block';
};
window.back = ()=> showPage('game');

// LOGIN
window.login = ()=>{
  let m = mobile.value;
  let p = pass.value;
  currentUser = m;

  get(child(ref(db), 'users/'+m)).then(snap=>{
    if(snap.exists()){
      let data = snap.val();
      if(data.password === p){
        balance = data.balance;
      } else return alert("Wrong password");
    } else {
      balance = 100;
      set(ref(db,'users/'+m),{password:p,balance});
    }

    bal.innerText = balance;
    showPage('game');
  });
};

// GAME
window.startGame = ()=>{
  if(running) return;

  betAmt = Number(bet.value);
  if(betAmt<=0 || betAmt>balance) return alert("Invalid Bet");

  balance -= betAmt;
  updateBalance();

  multi=1;
  crash = Math.random()*5+1;
  running=true;
  status.innerText="Running...";

  let int = setInterval(()=>{
    if(!running) return clearInterval(int);

    multi += 0.1;
    multiEl.innerText = multi.toFixed(2)+"x";

    if(multi>=crash){
      running=false;
      clearInterval(int);
      status.innerText="Crashed 💥";
      multiEl.innerText="1.00x";
      updateBalance();
    }
  },200);
};

// CASHOUT
window.cashout = ()=>{
  if(!running) return;

  let win = betAmt * multi;
  balance += win;
  running=false;
  status.innerText="Cashed Out ✅";
  updateBalance();
};

// SAVE BALANCE
function updateBalance(){
  bal.innerText = Math.floor(balance);
  update(ref(db,'users/'+currentUser),{balance});
}

// DEPOSIT
window.deposit = ()=>{
  let amt = Number(damount.value);
  let u = utr.value;

  if(amt<=0 || amt>500) return alert("Max 500");

  push(ref(db,'deposits'),{
    user: currentUser,
    amount: amt,
    utr: u,
    status: "pending"
  });

  alert("Deposit Request Sent");
};

// WITHDRAW
window.withdraw = ()=>{
  let amt = Number(wamount.value);

  if(amt<=0 || amt>balance) return alert("Invalid");

  push(ref(db,'withdraw'),{
    user: currentUser,
    name: name.value,
    acc: acc.value,
    ifsc: ifsc.value,
    amount: amt,
    status: "pending"
  });

  alert("Withdraw Request Sent");
};
</script>

</body>
</html>
