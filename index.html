<!DOCTYPE html>
<html>
<head>
<title>Aviator Clean Pro</title>

<style>
body{
margin:0;
background:#0a0a0a;
color:white;
font-family:Arial;
text-align:center;
}

h1{font-size:60px;color:#00ff99;}

#plane{
position:absolute;
bottom:50px;
left:50px;
width:50px;
transition:0.2s;
}

button,input{
padding:10px;
margin:5px;
}
</style>
</head>

<body>

<h2>AVIATOR</h2>

<h1 id="multi">1.00x</h1>

<img id="plane" src="https://i.imgur.com/3Q9QZ5p.png">

<br>

<input id="betAmount" placeholder="Bet">

<br>

<button onclick="placeBet()">BET</button>
<button onclick="cashout()">CASHOUT</button>

<h3 id="status"></h3>
<h3 id="timer"></h3>

<audio id="crashSound" src="https://actions.google.com/sounds/v1/cartoon/pop.ogg"></audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, set, update, onValue, get, child }
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDCYEveGXPy1nORiyyeyIjsbfcqEy4iaVg",
authDomain: "avaitior-game.firebaseapp.com",
databaseURL: "https://avaitior-game-default-rtdb.firebaseio.com",
projectId: "avaitior-game"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentUser = localStorage.getItem("user");
let balance = 1000;
let userBet = 0;

let currentMultiplier = 1;
let crashed = false;

/* GAME ENGINE */
function startGame(){
let m = 1;
let crashPoint = (Math.random()*4)+1.5;

update(ref(db,'game'),{
multiplier:1,
crashed:false,
timer:0
});

let loop = setInterval(()=>{

m += 0.05;
m = Number(m.toFixed(2));

update(ref(db,'game'),{
multiplier:m
});

if(m >= crashPoint){
clearInterval(loop);

document.getElementById("crashSound").play();

update(ref(db,'game'),{
crashed:true,
timer:3
});

let t = 3;

let timer = setInterval(()=>{

t--;

update(ref(db,'game'),{timer:t});

if(t<=0){
clearInterval(timer);
startGame();
}

},1000);
}

},120);
}

startGame();

/* WATCH GAME */
onValue(ref(db,'game'),(snap)=>{
if(!snap.exists()) return;

let g = snap.val();

currentMultiplier = g.multiplier || 1;
crashed = g.crashed || false;

document.getElementById("multi").innerText =
currentMultiplier.toFixed(2)+"x";

document.getElementById("timer").innerText =
g.timer>0 ? "Next Round: "+g.timer : "";

let left = currentMultiplier * 40;
let bottom = currentMultiplier * 10;

document.getElementById("plane").style.left = left+"px";
document.getElementById("plane").style.bottom = bottom+"px";

if(crashed){
document.getElementById("status").innerText="CRASHED";
}else{
document.getElementById("status").innerText="";
}

});

/* BET */
window.placeBet=()=>{
let bet = Number(document.getElementById("betAmount").value);

if(bet<=0) return alert("Invalid");

if(bet>balance) return alert("Low balance");

if(userBet>0) return alert("Already bet");

if(crashed) return alert("Wait next round");

balance -= bet;
userBet = bet;
};

/* CASHOUT */
window.cashout=()=>{
if(userBet<=0) return alert("No bet");

if(crashed){
userBet=0;
return alert("Crashed");
}

let win = Math.floor(userBet * currentMultiplier);

balance += win;

document.getElementById("status").innerText =
"Won ₹"+win;

userBet = 0;
};

</script>

</body>
</html>
