<!DOCTYPE html>
<html>
<head>
<title>Aviator Game</title>

<style>
body { background:#111; color:#fff; text-align:center; font-family:sans-serif; }

.page { display:none; }

#plane {
  position:absolute;
  width:60px;
  left:10px;
  top:250px;
  transition: all 0.1s linear;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="page" style="display:block;">
<h2>Login</h2>
<input id="mobile" placeholder="Mobile"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<!-- GAME -->
<div id="game" class="page">
<h3>Balance: ₹<span id="bal">100</span></h3>

<h1 id="multi">1.00x</h1>

<img id="plane" src="https://i.imgur.com/6QZ6Z6X.png">

<input id="bet" placeholder="Bet"><br>
<button onclick="startGame()">Start</button>
<button onclick="cashout()">Cashout</button><br>

<h4 id="status"></h4>
</div>

<script>
let currentUser="";
let balance=100;

// LOAD BALANCE
if(localStorage.getItem("balance")){
  balance = Number(localStorage.getItem("balance"));
}
document.getElementById("bal").innerText = balance;

// LOGIN
function login(){
let m=mobile.value;
let p=pass.value;

if(!m || !p) return alert("Fill details");

currentUser = m;

if(!localStorage.getItem("user_"+m)){
  localStorage.setItem("user_"+m, JSON.stringify({pass:p, balance:100}));
}else{
  let data = JSON.parse(localStorage.getItem("user_"+m));
  if(data.pass !== p) return alert("Wrong password");
  balance = data.balance;
}

document.getElementById("bal").innerText = balance;
document.getElementById("login").style.display="none";
document.getElementById("game").style.display="block";
}

// SAVE
function save(){
localStorage.setItem("user_"+currentUser, JSON.stringify({pass:pass.value, balance:balance}));
}

// GAME
let running=false;
let multi=1;
let crash=0;
let interval;
let x=10;

function startGame(){
let betVal = Number(document.getElementById("bet").value);

if(!betVal || betVal<=0 || betVal>balance){
alert("Enter valid bet");
return;
}

balance -= betVal;
updateBal();

multi=1;
x=10;
crash = Math.random()*5+1;
running=true;

let plane = document.getElementById("plane");

plane.style.left="10px";
plane.style.top="250px";

interval = setInterval(()=>{
if(!running) return;

multi+=0.05;
x += multi*3;

plane.style.left = x+"px";
plane.style.top = (250 - multi*15)+"px";

document.getElementById("multi").innerText = multi.toFixed(2)+"x";

if(multi>=crash){
running=false;
clearInterval(interval);

plane.style.transition="all 0.5s";
plane.style.left=(x+200)+"px";
plane.style.top="0px";

document.getElementById("status").innerText="💥 Crashed";
save();
}
},100);
}

function cashout(){
if(running){
let betVal = Number(document.getElementById("bet").value);
let win = betVal * multi;

balance += win;
running=false;
clearInterval(interval);

document.getElementById("status").innerText="✅ Cashed Out ₹"+Math.floor(win);
updateBal();
save();
}
}

function updateBal(){
document.getElementById("bal").innerText = Math.floor(balance);
localStorage.setItem("balance", balance);
}
</script>

</body>
</html>
