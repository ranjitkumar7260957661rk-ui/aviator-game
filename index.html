<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";

import {
getDatabase,
ref,
set,
get,
child,
update,
push,
onValue
}
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "YOUR_API_KEY",

authDomain: "avaitior-game.firebaseapp.com",

databaseURL: "https://avaitior-game-default-rtdb.firebaseio.com",

projectId: "avaitior-game"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

/* USER */

let currentUser = localStorage.getItem("user") || "";

let balance = 0;

/* AUTO LOGIN */

if(currentUser){

document.getElementById("loginPage").style.display="none";

document.getElementById("gamePage").style.display="block";

loadUser();

}

/* LOGIN */

window.login = ()=>{

let m = document.getElementById("mobile").value;

let p = document.getElementById("password").value;

if(!m || !p){

alert("Enter details");

return;

}

currentUser = m;

localStorage.setItem("user",m);

get(child(ref(db),'users/'+m)).then((snap)=>{

if(snap.exists()){

if(snap.val().password == p){

document.getElementById("loginPage").style.display="none";

document.getElementById("gamePage").style.display="block";

/* REALTIME LOAD */
loadUser();

}else{

alert("Wrong Password");

}

}else{

set(ref(db,'users/'+m),{

password:p,

balance:0

}).then(()=>{

document.getElementById("loginPage").style.display="none";

document.getElementById("gamePage").style.display="block";

/* REALTIME LOAD */
loadUser();

});

}

});

};

/* REALTIME USER LOAD */

function loadUser(){

onValue(ref(db,'users/'+currentUser),(snap)=>{

if(snap.exists()){

let data = snap.val();

/* BALANCE AUTO UPDATE */

balance = Number(data.balance) || 0;

document.getElementById("balance").innerText = balance;

}

});

}

/* SAVE BALANCE */

function saveBalance(){

update(ref(db,'users/'+currentUser),{

balance:Number(balance)

});

}

/* MENU */

window.openMenu = ()=>{

let menu = document.getElementById("menu");

if(menu.style.left=="0px"){

menu.style.left="-250px";

}else{

menu.style.left="0px";

}

};

/* POPUP */

window.showDeposit = ()=>{

document.getElementById("menu").style.left="-250px";

document.getElementById("withdrawBox").style.display="none";

document.getElementById("depositBox").style.display="block";

};

window.showWithdraw = ()=>{

document.getElementById("menu").style.left="-250px";

document.getElementById("depositBox").style.display="none";

document.getElementById("withdrawBox").style.display="block";

};

window.closeAll = ()=>{

document.getElementById("depositBox").style.display="none";

document.getElementById("withdrawBox").style.display="none";

document.getElementById("menu").style.left="-250px";

};

/* LOGOUT */

window.logout = ()=>{

localStorage.removeItem("user");

location.reload();

};

/* GAME */

let multiplier = 1;

let userBet = 0;

let crashed = false;

function startRound(){

multiplier = 1;

crashed = false;

document.getElementById("status").innerText = "";

let crashPoint = (Math.random()*5)+1;

let gameLoop = setInterval(()=>{

if(crashed){

clearInterval(gameLoop);

return;

}

multiplier += 0.10;

document.getElementById("multi").innerText =
multiplier.toFixed(2)+"x";

if(multiplier >= crashPoint){

crashed = true;

document.getElementById("status").innerText =
"CRASHED!";

userBet = 0;

setTimeout(startRound,2000);

}

},200);

}

startRound();

/* BET */

window.placeBet = ()=>{

let bet = Number(document.getElementById("betAmount").value);

if(bet<=0){

alert("Invalid Bet");

return;

}

if(bet>balance){

alert("Low Balance");

return;

}

if(userBet>0){

alert("Already Bet");

return;

}

balance -= bet;

saveBalance();

userBet = bet;

};

/* CASHOUT */

window.cashout = ()=>{

if(userBet<=0){

alert("No Bet");

return;

}

if(crashed){

alert("Round Crashed");

return;

}

let win = Math.floor(userBet * multiplier);

balance += win;

saveBalance();

document.getElementById("status").innerText =
"You Won ₹"+win;

userBet = 0;

};

/* DEPOSIT */

window.submitDeposit = ()=>{

let amount = document.getElementById("depAmount").value;

let utr = document.getElementById("utr").value;

if(amount < 500){

alert("Minimum ₹500");

return;

}

push(ref(db,'deposits'),{

user:currentUser,

amount:Number(amount),

utr:utr,

status:"pending"

});

alert("Deposit Request Submitted");

closeAll();

};

/* WITHDRAW */

window.submitWithdraw = ()=>{

let name = document.getElementById("wname").value;

let bank = document.getElementById("bank").value;

let acc = document.getElementById("acc").value;

let ifsc = document.getElementById("ifsc").value;

let amount = document.getElementById("wamount").value;

if(amount < 500){

alert("Minimum ₹500");

return;

}

push(ref(db,'withdraws'),{

user:currentUser,

name:name,

bank:bank,

account:acc,

ifsc:ifsc,

amount:Number(amount),

status:"pending"

});

alert("Withdraw Request Submitted");

closeAll();

};

</script>
