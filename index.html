<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aviator Demo</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
    text-align:center;
}

/* LOGIN */

#loginPage{
    padding-top:120px;
}

input{
    width:250px;
    padding:12px;
    margin:8px;
    border:none;
    border-radius:8px;
    font-size:16px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    margin:5px;
}

.mainBtn{
    background:orange;
    color:white;
}

/* GAME */

#gamePage{
    display:none;
}

.topBar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    background:#1b1b1b;
}

.menuBtn{
    font-size:25px;
    cursor:pointer;
}

.balance{
    font-size:20px;
    font-weight:bold;
}

/* MENU */

#menu{
    position:fixed;
    left:-250px;
    top:0;
    width:220px;
    height:100%;
    background:#1d1d1d;
    transition:0.3s;
    padding-top:40px;
    z-index:999;
}

#menu button{
    width:180px;
    margin:10px;
    background:#333;
    color:white;
}

/* GAME AREA */

.gameArea{
    margin-top:60px;
}

#plane{
    font-size:50px;
    transition:0.2s;
}

#multi{
    font-size:55px;
    font-weight:bold;
    margin-top:20px;
}

/* PAGES */

.popup{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#1f1f1f;
    width:320px;
    padding:20px;
    border-radius:15px;
}

.popup h2{
    margin-top:0;
}

.small{
    color:#aaa;
    font-size:14px;
}

</style>
</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage">

<h1>AVIATOR</h1>

<input id="mobile" placeholder="Mobile Number"><br>

<input id="password" type="password" placeholder="Password"><br>

<button class="mainBtn" onclick="login()">LOGIN</button>

</div>

<!-- GAME PAGE -->

<div id="gamePage">

<div class="topBar">

<div class="menuBtn" onclick="openMenu()">☰</div>

<div class="balance">
Balance ₹<span id="balance">0</span>
</div>

</div>

<!-- MENU -->

<div id="menu">

<button onclick="showDeposit()">Deposit</button>

<button onclick="showWithdraw()">Withdraw</button>

<button onclick="logout()">Logout</button>

</div>

<!-- GAME -->

<div class="gameArea">

<div id="plane">✈️</div>

<div id="multi">1.00x</div>

<br>

<input id="betAmount" placeholder="Enter Bet">

<br>

<button class="mainBtn" onclick="placeBet()">BET</button>

<button onclick="cashout()">CASHOUT</button>

<h3 id="status"></h3>

</div>

</div>

<!-- DEPOSIT -->

<div id="depositBox" class="popup">

<h2>Deposit</h2>

<p>UPI ID:</p>

<h3>7260957661@ybl</h3>

<p class="small">Minimum Deposit ₹500</p>

<input id="depAmount" placeholder="Amount">

<input id="utr" placeholder="UTR Number">

<button class="mainBtn" onclick="submitDeposit()">Submit</button>

<button onclick="closeAll()">Back</button>

</div>

<!-- WITHDRAW -->

<div id="withdrawBox" class="popup">

<h2>Withdraw</h2>

<p class="small">Minimum Withdraw ₹500</p>

<input id="wname" placeholder="Name">

<input id="bank" placeholder="Bank Name">

<input id="acc" placeholder="Account Number">

<input id="ifsc" placeholder="IFSC Code">

<input id="wamount" placeholder="Amount">

<button class="mainBtn" onclick="submitWithdraw()">Submit</button>

<button onclick="closeAll()">Back</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";

import {
getDatabase,
ref,
set,
get,
child,
update,
push,
onValue
}
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "YOUR_API_KEY",

authDomain: "avaitior-game.firebaseapp.com",

databaseURL: "https://avaitior-game-default-rtdb.firebaseio.com",

projectId: "avaitior-game"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

/* USER */

let currentUser = localStorage.getItem("user") || "";

let balance = 0;

/* AUTO LOGIN */

if(currentUser){

document.getElementById("loginPage").style.display="none";

document.getElementById("gamePage").style.display="block";

loadUser();

}

/* LOGIN */

window.login = ()=>{

let m = document.getElementById("mobile").value;

let p = document.getElementById("password").value;

if(!m || !p){

alert("Enter details");

return;

}

currentUser = m;

localStorage.setItem("user",m);

get(child(ref(db),'users/'+m)).then((snap)=>{

if(snap.exists()){

if(snap.val().password == p){

loadUser();

document.getElementById("loginPage").style.display="none";

document.getElementById("gamePage").style.display="block";

}else{

alert("Wrong Password");

}

}else{

set(ref(db,'users/'+m),{

password:p,

balance:1000

});

loadUser();

document.getElementById("loginPage").style.display="none";

document.getElementById("gamePage").style.display="block";

}

});

};

/* LOAD USER */

function loadUser(){

onValue(ref(db,'users/'+currentUser),(snap)=>{

if(snap.exists()){

balance = snap.val().balance || 0;

document.getElementById("balance").innerText = balance;

}

});

}

/* SAVE BALANCE */

function saveBalance(){

update(ref(db,'users/'+currentUser),{

balance:balance

});

}

/* MENU */

window.openMenu = ()=>{

let menu = document.getElementById("menu");

if(menu.style.left=="0px"){

menu.style.left="-250px";

}else{

menu.style.left="0px";

}

};

/* POPUPS */

window.showDeposit = ()=>{

document.getElementById("depositBox").style.display="block";

};

window.showWithdraw = ()=>{

document.getElementById("withdrawBox").style.display="block";

};

window.closeAll = ()=>{

document.getElementById("depositBox").style.display="none";

document.getElementById("withdrawBox").style.display="none";

};

/* LOGOUT */

window.logout = ()=>{

localStorage.removeItem("user");

location.reload();

};

/* GAME */

let multiplier = 1;

let running = true;

let userBet = 0;

let crashed = false;

function startRound(){

multiplier = 1;

crashed = false;

document.getElementById("status").innerText = "";

let crashPoint = (Math.random()*5)+1;

let gameLoop = setInterval(()=>{

if(crashed){

clearInterval(gameLoop);

return;

}

multiplier += 0.10;

document.getElementById("multi").innerText =
multiplier.toFixed(2)+"x";

if(multiplier >= crashPoint){

crashed = true;

document.getElementById("status").innerText =
"CRASHED!";

userBet = 0;

setTimeout(startRound,2000);

}

},200);

}

startRound();

/* BET */

window.placeBet = ()=>{

let bet = Number(document.getElementById("betAmount").value);

if(bet<=0){

alert("Invalid Bet");

return;

}

if(bet>balance){

alert("Low Balance");

return;

}

if(userBet>0){

alert("Already Bet");

return;

}

balance -= bet;

saveBalance();

userBet = bet;

};

/* CASHOUT */

window.cashout = ()=>{

if(userBet<=0){

alert("No Bet");

return;

}

if(crashed){

alert("Round Crashed");

return;

}

let win = Math.floor(userBet * multiplier);

balance += win;

saveBalance();

document.getElementById("status").innerText =
"You Won ₹"+win;

userBet = 0;

};

/* DEPOSIT */

window.submitDeposit = ()=>{

let amount = document.getElementById("depAmount").value;

let utr = document.getElementById("utr").value;

if(amount < 500){

alert("Minimum ₹500");

return;

}

push(ref(db,'deposits'),{

user:currentUser,

amount:amount,

utr:utr,

status:"pending"

});

alert("Deposit Request Submitted");

closeAll();

};

/* WITHDRAW */

window.submitWithdraw = ()=>{

let name = document.getElementById("wname").value;

let bank = document.getElementById("bank").value;

let acc = document.getElementById("acc").value;

let ifsc = document.getElementById("ifsc").value;

let amount = document.getElementById("wamount").value;

if(amount < 500){

alert("Minimum ₹500");

return;

}

push(ref(db,'withdraws'),{

user:currentUser,

name:name,

bank:bank,

account:acc,

ifsc:ifsc,

amount:amount,

status:"pending"

});

alert("Withdraw Request Submitted");

closeAll();

};

</script>

</body>
</html>
