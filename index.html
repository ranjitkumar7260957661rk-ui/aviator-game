<!DOCTYPE html>
<html>
<head>
<title>Aviator</title>

<style>
body { background:#111; color:#fff; text-align:center; font-family:sans-serif; }

input, button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:5px;
  width:200px;
}

button {
  background:#00ffcc;
  color:#000;
  font-weight:bold;
}

#plane {
  font-size:50px;
  margin:20px;
  transition: transform 0.1s linear;
}
</style>

</head>
<body>

<h2>Aviator ✈️</h2>

<!-- LOGIN -->
<div id="login">
  <input id="mobile" placeholder="Mobile"><br>
  <input id="pass" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- GAME -->
<div id="game" style="display:none;">
  <h3>Total Balance: ₹<span id="bal">0</span></h3>

  <button onclick="showDeposit()">Deposit</button>
  <button onclick="showWithdraw()">Withdraw</button>

  <div id="plane">✈️</div>
  <h1 id="multi">1.00x</h1>

  <input id="bet" placeholder="Bet Amount"><br>
  <button onclick="startBet()">Start</button>
  <button onclick="cashout()">Cashout</button>
</div>

<!-- DEPOSIT -->
<div id="deposit" style="display:none;">
  <h3>Deposit</h3>
  <p>UPI: 7260957661@ybl</p>
  <p>Max ₹500</p>
  <input id="depAmt" placeholder="Amount"><br>
  <button onclick="sendDeposit()">Submit</button><br>
  <button onclick="backGame()">Back</button>
</div>

<!-- WITHDRAW -->
<div id="withdraw" style="display:none;">
  <h3>Withdraw</h3>
  <p>Max ₹500 (Only real balance)</p>
  <input id="name" placeholder="Name"><br>
  <input id="acc" placeholder="Account Number"><br>
  <input id="ifsc" placeholder="IFSC"><br>
  <input id="withAmt" placeholder="Amount"><br>
  <button onclick="sendWithdraw()">Submit</button><br>
  <button onclick="backGame()">Back</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update, push } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

/* 🔴 APNA FIREBASE DATA YAHAN DAAL */
const app = initializeApp({
  apiKey: "PASTE_API_KEY",
  authDomain: "PASTE.firebaseapp.com",
  databaseURL: "https://PASTE-default-rtdb.firebaseio.com",
  projectId: "PASTE"
});

const db = getDatabase(app);

let user = "";
let balance = 0;
let bonus = 0;
let multiplier = 1;
let running = false;
let betAmt = 0;

// LOGIN
window.login = async function() {

  user = document.getElementById("mobile").value;

  if(!user){
    alert("Enter Mobile");
    return;
  }

  let snap = await get(ref(db, "users/" + user));

  if (!snap.exists()) {
    balance = 0;
    bonus = 100;

    await set(ref(db, "users/" + user), {
      balance,
      bonus
    });

  } else {
    let data = snap.val();
    balance = Number(data.balance || 0);
    bonus = Number(data.bonus || 0);
  }

  updateBalance();

  document.getElementById("login").style.display="none";
  document.getElementById("game").style.display="block";
}

// BALANCE SHOW
function updateBalance(){
  document.getElementById("bal").innerText = (balance + bonus).toFixed(2);
}

// START BET
window.startBet = function() {

  if (running) return;

  betAmt = Number(document.getElementById("bet").value);

  if (!betAmt || betAmt <= 0 || betAmt > (balance + bonus)) {
    alert("Invalid Bet");
    return;
  }

  if (bonus >= betAmt) {
    bonus -= betAmt;
  } else {
    let remain = betAmt - bonus;
    bonus = 0;
    balance -= remain;
  }

  saveUser();
  updateBalance();

  startGame();
}

// GAME
function startGame() {
  running = true;
  multiplier = 1;

  let crash = Math.random() * 5 + 1;

  let plane = document.getElementById("plane");
  plane.innerText = "✈️";

  let interval = setInterval(()=>{

    multiplier += 0.05;

    document.getElementById("multi").innerText = multiplier.toFixed(2) + "x";
    plane.style.transform = "translateY(-" + (multiplier*10) + "px)";

    if (multiplier >= crash) {
      clearInterval(interval);
      running = false;
      plane.innerText = "💥";

      setTimeout(()=>{
        plane.style.transform = "translateY(0px)";
        document.getElementById("multi").innerText = "1.00x";
      },2000);
    }

  },100);
}

// CASHOUT
window.cash
