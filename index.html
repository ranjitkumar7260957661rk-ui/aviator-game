
<!DOCTYPE html>
<html>
<head>
<title>Aviator Final</title>

<style>
body { background:#111; color:#fff; text-align:center; font-family:sans-serif; }
input, button { padding:10px; margin:5px; }

.page { display:none; }

.topbar {
  display:flex;
  justify-content:space-between;
  padding:10px;
}

#plane {
  font-size:40px;
  position:relative;
  left:0;
}
</style>
</head>

<body>

<h2>Aviator</h2>

<!-- LOGIN -->
<div id="login" class="page" style="display:block;">
<input id="mobile" placeholder="Mobile"><br>
<input id="pass" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<!-- GAME -->
<div id="game" class="page">

<div class="topbar">
<button onclick="showPage('deposit')">Deposit</button>
<button onclick="showPage('withdraw')">Withdraw</button>
</div>

<h3>Balance: ₹<span id="bal">0</span></h3>

<h1 id="plane">✈️</h1>
<h1 id="multi">1.00x</h1>

<input id="bet" placeholder="Bet"><br>
<button onclick="cashout()">Cashout</button>

</div>

<!-- DEPOSIT -->
<div id="deposit" class="page">
<h3>UPI: 7260957661@ybl</h3>
<p>Maximum Deposit: ₹500</p>

<input id="depAmt" placeholder="Amount"><br>
<input id="utr" placeholder="UTR Number"><br>
<button onclick="deposit()">Submit</button><br>
<button onclick="showPage('game')">Back</button>
</div>

<!-- WITHDRAW -->
<div id="withdraw" class="page">
<p>Maximum Withdraw: ₹500</p>

<input id="name" placeholder="Name"><br>
<input id="bank" placeholder="Bank Name"><br>
<input id="acc" placeholder="Account Number"><br>
<input id="ifsc" placeholder="IFSC Code"><br>
<input id="wAmt" placeholder="Amount"><br>
<button onclick="withdraw()">Submit</button><br>
<button onclick="showPage('game')">Back</button>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
<h3>Admin Panel</h3>
<div id="adminData"></div>
</div>

<button onclick="openAdmin()">Admin</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, set, get, child, push } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDCYEveGXPy1nORiyyeyIjsbfcqEy4iaVg",
  authDomain: "avaitior-game.firebaseapp.com",
  databaseURL: "https://avaitior-game-default-rtdb.firebaseio.com",
  projectId: "avaitior-game"
};const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let user="", balance=0, multi=1, running=false;

// PAGE SWITCH
window.showPage = (p)=>{
  document.querySelectorAll('.page').forEach(x=>x.style.display='none');
  document.getElementById(p).style.display='block';
};

// LOGIN
window.login = async ()=>{
  user = mobile.value;
  let passVal = pass.value;

  if(!user || !passVal) return alert("Fill details");

  const snap = await get(child(ref(db),"users/"+user));

  if(snap.exists()){
    balance = Number(snap.val().balance) || 0;
  } else {
    balance = 100;
    await set(ref(db,"users/"+user), {balance:balance});
  }

  bal.innerText = balance;
  showPage('game');
  startGame();
};
// GAME LOOP
function startGame(){
  multi = 1;
  running = true;
  let pos=0;

  let int = setInterval(()=>{
    multi+=0.05;
    pos+=4;

    multiEl.innerText = multi.toFixed(2)+"x";
    plane.style.left = pos+"px";

    if(Math.random()<0.03){
      clearInterval(int);
      running=false;

      multiEl.innerText="💥 "+multi.toFixed(2);

      setTimeout(startGame,3000);
    }
  },100);
}
// CASHOUT
window.cashout = ()=>{
  if(!running) return;

  let betVal = Number(bet.value);
  if(!betVal || betVal>balance) return alert("Invalid Bet");

  let win = betVal*multi;
  balance += win;

  set(ref(db,"users/"+user+"/balance"), balance);
  bal.innerText = balance;

  alert("Won ₹"+win.toFixed(0));
};

// DEPOSIT
window.deposit = ()=>{
  let amt = depAmt.value;
  let u = utr.value;

  if(!amt || amt>500) return alert("Max 500");

  push(ref(db,"deposits"),{
    user:user,
    amount:amt,
    utr:u,
    status:"pending"
  });
alert("Deposit request sent");
};

// WITHDRAW
window.withdraw = ()=>{
  let amt = wAmt.value;

  if(!amt || amt>500) return alert("Max 500");

  push(ref(db,"withdraws"),{
    user:user,
    name:name.value,
    bank:bank.value,
    acc:acc.value,
    ifsc:ifsc.value,
    amount:amt,
    status:"pending"
  });

  alert("Withdraw request sent");
};

// ADMIN PANEL
window.openAdmin = async ()=>{
  let code = prompt("Enter admin code");
  if(code!="1234") return;

  showPage('admin');

  let html="<h4>Deposits</h4>";
  let d = await get(ref(db,"deposits"));
  d.forEach(x=>{
    let v=x.val();
    html += `${v.user} ₹${v.amount} (${v.status})<br>`;
  });
  html+="<h4>Withdraws</h4>";
  let w = await get(ref(db,"withdraws"));
  w.forEach(x=>{
    let v=x.val();
    html += `${v.user} ₹${v.amount} (${v.status})<br>`;
  });

  adminData.innerHTML = html;
};
</script>

</body>
</html>
