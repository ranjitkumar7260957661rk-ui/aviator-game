<!DOCTYPE html>
<html>
<head>
  <title>Aviator</title>
  <style>
    body { background:#111; color:#fff; text-align:center; font-family:sans-serif; }
    input, button { padding:10px; margin:5px; }
    #plane { font-size:40px; margin:20px; }
  </style>
</head>
<body>

<h2>Aviator</h2>

<div id="login">
  <input id="mobile" placeholder="Mobile"><br>
  <input id="pass" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<div id="game" style="display:none;">
  <h3>Balance: ₹<span id="bal">0</span></h3>

  <button onclick="showDeposit()">Deposit</button>
  <button onclick="showWithdraw()">Withdraw</button>

  <div id="plane">✈️</div>
  <h1 id="multi">1.00x</h1>

  <input id="bet" placeholder="Bet">
  <br>
  <button onclick="bet()">Bet</button>
  <button onclick="cashout()">Cashout</button>
</div>

<!-- Deposit -->
<div id="deposit" style="display:none;">
  <h3>Deposit</h3>
  <p>UPI: 7260957661@ybl</p>
  <input id="depAmt" placeholder="Amount (max 500)">
  <input id="utr" placeholder="UTR">
  <button onclick="sendDeposit()">Submit</button>
</div>

<!-- Withdraw -->
<div id="withdraw" style="display:none;">
  <h3>Withdraw</h3>
  <input id="name" placeholder="Name">
  <input id="acc" placeholder="Account">
  <input id="ifsc" placeholder="IFSC">
  <input id="withAmt" placeholder="Amount (max 500)">
  <button onclick="sendWithdraw()">Submit</button>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update, push, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyDCYEveGXPy1nORiyyeyIjsbfcqEy4iaVg",
  authDomain: "avaitior-game.firebaseapp.com",
  databaseURL: "https://avaitior-game-default-rtdb.firebaseio.com",
  projectId: "avaitior-game"
});

const db = getDatabase(app);

let user = "";
let balance = 0;
let multiplier = 1;
let running = false;
let betAmt = 0;

// LOGIN
window.login = async function() {
  user = document.getElementById("mobile").value;
  let snap = await get(ref(db, "users/" + user));

  if (!snap.exists()) {
    await set(ref(db, "users/" + user), { balance: 100 });
    balance = 100;
  } else {
    balance = snap.val().balance;
  }

  document.getElementById("bal").innerText = balance.toFixed(2);
  document.getElementById("login").style.display="none";
  document.getElementById("game").style.display="block";
}

// BET
window.bet = function() {
  if (running) return;
  betAmt = parseInt(document.getElementById("bet").value);

  if (!betAmt || betAmt > balance) {
    alert("Invalid Bet");
    return;
  }

  balance -= betAmt;
  update(ref(db, "users/" + user), { balance });

  startGame();
}
// GAME LOOP
function startGame() {
  running = true;
  multiplier = 1;

  let crash = Math.random()*5 + 1;

  let interval = setInterval(()=>{
    multiplier += 0.05;
    document.getElementById("multi").innerText = multiplier.toFixed(2)+"x";

    if (multiplier >= crash) {
      clearInterval(interval);
      running=false;
      document.getElementById("plane").innerText="💥";
    }
  },100);
}

// CASHOUT
window.cashout = function() {
  if (!running) return;

  let win = betAmt * multiplier;
  balance += win;

  update(ref(db, "users/" + user), { balance });

  document.getElementById("bal").innerText = balance.toFixed(2);
  running=false;
}

// DEPOSIT
window.showDeposit = ()=> document.getElementById("deposit").style.display="block";

window.sendDeposit = ()=>{
  let amt = document.getElementById("depAmt").value;
  let utr = document.getElementById("utr").value;

  push(ref(db,"deposit"), {
    user, amt, utr, status:"pending"
  });

  alert("Deposit request sent");
}

// WITHDRAW
window.showWithdraw = ()=> document.getElementById("withdraw").style.display="block";

window.sendWithdraw = ()=>{
  let amt = document.getElementById("withAmt").value;

  push(ref(db,"withdraw"), {
    user, amt, status:"pending"
  });

  alert("Withdraw request sent");
}
</script>

</body>
</html>
