<!DOCTYPE html>
<html>
<head>
  <title>Aviator Game</title>
  <style>
    body { font-family: Arial; background:#111; color:#fff; text-align:center; }
    input, button { padding:10px; margin:5px; }
    .page { display:none; }
  </style>
</head>

<body>

<div id="login" class="page" style="display:block;">
  <h2>Login</h2>
  <input id="mobile" placeholder="Mobile"><br>
  <input id="pass" placeholder="Password" type="password"><br>
  <button onclick="login()">Login</button>
</div>

<div id="game" class="page">
  <h3>Balance: ₹<span id="bal">0</span></h3>
  <h1 id="multi">1.00x</h1>

  <input id="bet" placeholder="Bet"><br>
  <button onclick="betGame()">Bet</button>
  <button onclick="cashout()">Cashout</button><br>

  <button onclick="showPage('deposit')">Deposit</button>
  <button onclick="showPage('withdraw')">Withdraw</button>

  <h4 id="status"></h4>
</div>

<div id="deposit" class="page">
  <h2>Deposit</h2>
  <input id="damount" placeholder="Amount"><br>
  <input id="utr" placeholder="UTR"><br>
  <button onclick="deposit()">Submit</button>
  <button onclick="back()">Back</button>
</div>

<div id="withdraw" class="page">
  <h2>Withdraw</h2>
  <input id="wamount" placeholder="Amount"><br>
  <button onclick="withdraw()">Submit</button>
  <button onclick="back()">Back</button>
</div>

<script>
let balance = 100;
let currentUser = "";
let betAmt = 0;
let running = false;
let multi = 1;
let crash = 0;

// PAGE SWITCH
function showPage(p){
  document.querySelectorAll('.page').forEach(x=>x.style.display='none');
  document.getElementById(p).style.display='block';
}
function back(){ showPage('game'); }

// LOGIN
function login(){
  currentUser = document.getElementById("mobile").value;
  showPage("game");
  document.getElementById("bal").innerText = balance;
}

// 24/7 AUTO GAME LOOP
setInterval(()=>{
  if(!running){
    startRound();
  }
},3000);

function startRound(){
  running = true;
  multi = 1;
  crash = Math.random()*5+1;
  document.getElementById("status").innerText="Running...";

  let int = setInterval(()=>{
    multi += 0.1;
    document.getElementById("multi").innerText = multi.toFixed(2)+"x";

    if(multi >= crash){
      running = false;
      clearInterval(int);
      document.getElementById("status").innerText="Crashed!";
    }
  },200);
}

// BET
function betGame(){
  let b = Number(document.getElementById("bet").value);
  if(b<=0 || b>balance) return alert("Invalid Bet");
  betAmt = b;
  balance -= b;
  document.getElementById("bal").innerText = balance;
}

// CASHOUT
function cashout(){
  if(!running || betAmt==0) return;

  let win = betAmt * multi;
  balance += Math.floor(win);
  document.getElementById("bal").innerText = balance;
  document.getElementById("status").innerText="Cashed Out!";
  betAmt = 0;
}

// DEPOSIT
function deposit(){
  alert("Deposit Request Sent");
}

// WITHDRAW
function withdraw(){
  alert("Withdraw Request Sent");
}
</script>

</body>
</html>
