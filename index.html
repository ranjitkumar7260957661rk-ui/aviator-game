<button onclick="placeBet()">BET</button>

<button onclick="cashout()">CASHOUT</button>

<h3 id="status"></h3>

<div class="menuBtns">

<button onclick="openDeposit()">Deposit</button>

<button onclick="openWithdraw()">Withdraw</button>

<button onclick="logout()">Logout</button>

</div>

</div>

<!-- DEPOSIT -->
<div id="depositBox" class="popup">

<h2>Deposit</h2>

<p>Minimum ₹500</p>

<p><b>UPI:</b> 7260957661@ybl</p>

<input id="depAmount" placeholder="Amount"><br>

<input id="utr" placeholder="UTR Number"><br>

<button onclick="submitDeposit()">Submit</button>

<button onclick="closeAll()">Close</button>

</div>

<!-- WITHDRAW -->
<div id="withdrawBox" class="popup">

<h2>Withdraw</h2>

<input id="wname" placeholder="Name"><br>

<input id="bank" placeholder="Bank Name"><br>

<input id="acc" placeholder="Account Number"><br>

<input id="ifsc" placeholder="IFSC"><br>

<input id="wamount" placeholder="Amount"><br>

<button onclick="submitWithdraw()">Submit</button>

<button onclick="closeAll()">Close</button>

</div>

<script>

/* USER DATA */

let currentUser = "";
let balance = 0;

let currentMultiplier = 1;
let crashed = false;
let userBet = 0;
let gameRunning = false;
let cashedOut = false;

/* AUTO LOGIN */

if(localStorage.getItem("user")){

currentUser = localStorage.getItem("user");

openGame();

}

/* LOGIN */

function login(){

let mobile =
document.getElementById("mobile").value;

let password =
document.getElementById("password").value;

if(!mobile || !password){

alert("Enter Details");

return;
}

currentUser = mobile;

localStorage.setItem("user",mobile);

if(localStorage.getItem("balance_"+mobile) === null){

localStorage.setItem("balance_"+mobile,"0");

}

openGame();

}

/* OPEN GAME */

function openGame(){

document.getElementById("loginPage").style.display="none";

document.getElementById("gamePage").style.display="block";

let savedBalance =
localStorage.getItem("balance_"+currentUser);

balance = Number(savedBalance || 0);

updateBalance();

startGame();

}

/* UPDATE BALANCE */

function updateBalance(){

document.getElementById("balance").innerText = balance;

localStorage.setItem(
"balance_"+currentUser,
balance
);

}

/* GAME LOOP */

function startGame(){

if(gameRunning) return;

gameRunning = true;

currentMultiplier = 1;

crashed = false;

cashedOut = false;

document.getElementById("status").innerText = "";

document.getElementById("timer").innerText = "";

let crashPoint =
(Number((Math.random()*8)+1).toFixed(2));

let loop = setInterval(()=>{

currentMultiplier += 0.03;

document.getElementById("multi").innerText =
currentMultiplier.toFixed(2)+"x";

if(currentMultiplier >= crashPoint){

clearInterval(loop);

crashed = true;

gameRunning = false;

document.getElementById("status").innerText =
"CRASHED 💥 at "+crashPoint+"x";

userBet = 0;

/* 3 SECOND TIMER */

let t = 3;

document.getElementById("timer").innerText =
"Next Round In "+t;

let timerLoop = setInterval(()=>{

t--;

document.getElementById("timer").innerText =
"Next Round In "+t;

if(t<=0){

clearInterval(timerLoop);

document.getElementById("timer").innerText = "";

startGame();

}

},1000);

}

},120);

}

/* BET */

function placeBet(){

let bet =
Number(document.getElementById("betInput").value);

if(bet<=0){

alert("Invalid Bet");

return;
}

if(bet>balance){

alert("Low Balance");

return;
}

if(userBet>0){

alert("Already Bet");

return;
}

if(crashed){

alert("Wait Next Round");

return;
}

balance -= bet;

updateBalance();

userBet = bet;

cashedOut = false;

}

/* CASHOUT */

function cashout(){

if(userBet<=0){

alert("No Bet");

return;
}

/* ONLY ONE CASHOUT */

if(cashedOut){

alert("Already Cashed Out");

return;
}

if(crashed){

alert("Round Crashed");

userBet = 0;

return;
}

let win =
Math.floor(userBet * currentMultiplier);

balance += win;

updateBalance();

document.getElementById("status").innerText =
"You Won ₹"+win;

cashedOut = true;

userBet = 0;

}

/* OPEN DEPOSIT */

function openDeposit(){

document.getElementById("depositBox").style.display="block";

}

/* OPEN WITHDRAW */

function openWithdraw(){

document.getElementById("withdrawBox").style.display="block";

}

/* CLOSE */

function closeAll(){

document.getElementById("depositBox").style.display="none";

document.getElementById("withdrawBox").style.display="none";

}

/* DEPOSIT */

function submitDeposit(){

let amount =
Number(document.getElementById("depAmount").value);

if(amount < 500){

alert("Minimum Deposit ₹500");

return;
}

alert(
"Deposit Request Sent\nUPI: 7260957661@ybl"
);

closeAll();

}

/* WITHDRAW */

function submitWithdraw(){

let amount =
Number(document.getElementById("wamount").value);

if(amount<=0){

alert("Invalid Amount");

return;
}

alert("Withdraw Request Sent");

closeAll();

}

/* LOGOUT */

function logout(){

localStorage.removeItem("user");

location.reload();

}

</script>

</body>
</html>
