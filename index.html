<!DOCTYPE html>
<html>
<head>
<title>Aviator Game</title>

<style>

body{
margin:0;
padding:0;
background:#111;
font-family:Arial;
color:white;
text-align:center;
}

#loginPage,#gamePage{
padding:20px;
}

input{
padding:12px;
margin:8px;
width:220px;
border:none;
border-radius:6px;
font-size:16px;
}

button{
padding:12px 20px;
margin:8px;
border:none;
border-radius:6px;
background:#00bcd4;
color:white;
font-size:16px;
font-weight:bold;
}

#topbar{
background:#000;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

#multi{
font-size:70px;
color:#00ff99;
margin-top:60px;
}

#betTimer{
font-size:22px;
color:yellow;
margin-top:10px;
}

#timer{
font-size:20px;
color:#00bcd4;
margin-top:10px;
}

#status{
font-size:26px;
margin-top:20px;
}

.popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#222;
padding:20px;
border-radius:10px;
width:300px;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginPage">

<h2>Login</h2>

<input id="mobile" placeholder="Mobile"><br>

<input id="password" type="password" placeholder="Password"><br>

<button onclick="login()">LOGIN</button>

</div>

<!-- GAME -->

<div id="gamePage" style="display:none;">

<div id="topbar">

<h3>Balance ₹<span id="balance">0</span></h3>

<button onclick="logout()">Logout</button>

</div>

<h1 id="multi">1.00x</h1>

<div id="betTimer">Bet Time: 5</div>

<div id="timer"></div>

<input id="betAmount" placeholder="Bet Amount"><br>

<button onclick="placeBet()">BET</button>

<button onclick="cashout()">CASHOUT</button>

<h2 id="status"></h2>

<br>

<button onclick="openDeposit()">Deposit</button>

<button onclick="openWithdraw()">Withdraw</button>

</div>

<!-- DEPOSIT -->

<div id="depositBox" class="popup">

<h2>Deposit</h2>

<p>Minimum ₹500</p>

<p>UPI: 7260957661@ybl</p>

<input id="depAmount" placeholder="Amount"><br>

<input id="utr" placeholder="UTR Number"><br>

<button onclick="submitDeposit()">Submit</button>

<button onclick="closeAll()">Close</button>

</div>

<!-- WITHDRAW -->

<div id="withdrawBox" class="popup">

<h2>Withdraw</h2>

<p>Minimum ₹500</p>

<input id="wamount" placeholder="Amount"><br>

<button onclick="submitWithdraw()">Submit</button>

<button onclick="closeAll()">Close</button>

</div>

<script>

/* LOGIN */

let currentUser = localStorage.getItem("user") || "";

let balance = Number(localStorage.getItem("balance")) || 0;

if(currentUser!=""){

document.getElementById("loginPage").style.display="none";

document.getElementById("gamePage").style.display="block";

document.getElementById("balance").innerText=balance;

}

function login(){

let mobile=document.getElementById("mobile").value;

let password=document.getElementById("password").value;

if(mobile=="" || password==""){

alert("Enter Details");

return;

}

localStorage.setItem("user",mobile);

currentUser=mobile;

document.getElementById("loginPage").style.display="none";

document.getElementById("gamePage").style.display="block";

document.getElementById("balance").innerText=balance;

}

function logout(){

localStorage.removeItem("user");

location.reload();

}

/* GAME */

let multiplier=1;

let crashed=false;

let userBet=0;

let betClosed=false;

let cashedOut=false;

function startRound(){

multiplier=1;

crashed=false;

betClosed=false;

cashedOut=false;

userBet=0;

document.getElementById("multi").innerText="1.00x";

document.getElementById("status").innerText="";

let betTime=5;

document.getElementById("betTimer").innerText=
"Bet Time: "+betTime;

let betLoop=setInterval(()=>{

betTime--;

document.getElementById("betTimer").innerText=
"Bet Time: "+betTime;

if(betTime<=0){

clearInterval(betLoop);

betClosed=true;

document.getElementById("betTimer").innerText=
"BET CLOSED";

startFlying();

}

},1000);

}

function startFlying(){

let random=Math.random();

let crashPoint;

if(random<0.60){

crashPoint=(Math.random()*1.5+1.20);

}else if(random<0.90){

crashPoint=(Math.random()*2+2.50);

}else{

crashPoint=(Math.random()*4+5);

}

let loop=setInterval(()=>{

if(crashed){

clearInterval(loop);

return;

}

multiplier+=0.02;

document.getElementById("multi").innerText=
multiplier.toFixed(2)+"x";

if(multiplier>=crashPoint){

crashed=true;

clearInterval(loop);

document.getElementById("status").innerText=
"CRASHED 💥 at "+crashPoint.toFixed(2)+"x";

let t=3;

document.getElementById("timer").innerText=
"Next Round In "+t;

let timerLoop=setInterval(()=>{

t--;

document.getElementById("timer").innerText=
"Next Round In "+t;

if(t<=0){

clearInterval(timerLoop);

document.getElementById("timer").innerText="";

startRound();

}

},1000);

}

},170);

}

startRound();

/* BET */

function placeBet(){

let bet=Number(document.getElementById("betAmount").value);

if(betClosed){

alert("Bet Closed");

return;

}

if(userBet>0){

alert("Already Bet");

return;

}

if(bet<=0){

alert("Invalid Bet");

return;

}

if(bet>balance){

alert("Low Balance");

return;

}

balance-=bet;

localStorage.setItem("balance",balance);

document.getElementById("balance").innerText=balance;

userBet=bet;

document.getElementById("status").innerText=
"Bet Placed ₹"+bet;

}

/* CASHOUT */

function cashout(){

if(userBet<=0){

alert("No Bet");

return;

}

if(cashedOut){

alert("Already Cashed Out");

return;

}

if(crashed){

alert("Round Crashed");

return;

}

let win=Math.floor(userBet*multiplier);

balance+=win;

localStorage.setItem("balance",balance);

document.getElementById("balance").innerText=balance;

document.getElementById("status").innerText=
"You Won ₹"+win;

cashedOut=true;

userBet=0;

}

/* DEPOSIT */

function openDeposit(){

document.getElementById("depositBox").style.display="block";

}

function submitDeposit(){

let amount=Number(document.getElementById("depAmount").value);

if(amount<500){

alert("Minimum Deposit ₹500");

return;

}

alert("Deposit Request Sent\nUPI: 7260957661@ybl");

closeAll();

}

/* WITHDRAW */

function openWithdraw(){

document.getElementById("withdrawBox").style.display="block";

}

function submitWithdraw(){

let amount=Number(document.getElementById("wamount").value);

if(amount<500){

alert("Minimum Withdraw ₹500");

return;

}

alert("Withdraw Request Sent");

closeAll();

}

function closeAll(){

document.getElementById("depositBox").style.display="none";

document.getElementById("withdrawBox").style.display="none";

}

</script>

</body>
</html>
