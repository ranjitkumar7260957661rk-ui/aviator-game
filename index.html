<!DOCTYPE html>
<html>
<head>
<title>Aviator Clean Final</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
overflow:hidden;
}

.page{display:none;padding:20px;}

input,button{
padding:10px;
margin:5px;
border:none;
border-radius:5px;
}

button{
background:#00e5ff;
color:black;
font-weight:bold;
}

#multi{
font-size:55px;
color:#00ff99;
}

#plane{
position:absolute;
bottom:80px;
left:60px;
width:50px;
}

.popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#222;
padding:20px;
border-radius:10px;
width:300px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="page" style="display:block;">
<h2>Login</h2>
<input id="mobile" placeholder="Mobile"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<!-- GAME -->
<div id="gamePage" class="page">

<h3>Balance ₹<span id="balance">0</span></h3>

<div id="multi">1.00x</div>

<div style="height:120px;position:relative;">
<img id="plane" src="https://i.imgur.com/3Q9QZ5p.png">
</div>

<input id="betAmount" placeholder="Bet Amount"><br>

<button onclick="placeBet()">BET</button>
<button onclick="cashout()">CASHOUT</button>

<h3 id="status"></h3>

<button onclick="openDeposit()">Deposit</button>
<button onclick="openWithdraw()">Withdraw</button>

</div>

<!-- DEPOSIT -->
<div id="depositBox" class="popup">
<h3>Deposit</h3>

<p><b>UPI:</b> 7260957661@ybl</p>
<p>Minimum ₹500</p>

<input id="depAmount" placeholder="Amount"><br>
<input id="utr" placeholder="UTR Number"><br>

<button onclick="deposit()">Submit</button>
<button onclick="closeAll()">Close</button>
</div>

<!-- WITHDRAW -->
<div id="withdrawBox" class="popup">
<h3>Withdraw</h3>

<input id="wname" placeholder="Name"><br>
<input id="bank" placeholder="Bank"><br>
<input id="acc" placeholder="Account"><br>
<input id="ifsc" placeholder="IFSC"><br>
<input id="wamount" placeholder="Amount"><br>

<button onclick="withdraw()">Submit</button>
<button onclick="closeAll()">Close</button>
</div>

<script>

/* ELEMENTS SAFE INIT */
const balanceEl = document.getElementById("balance");
const multiEl = document.getElementById("multi");
const statusEl = document.getElementById("status");
const plane = document.getElementById("plane");

/* STATE */
let user="";
let balance=0;
let bet=0;
let running=false;

/* LOGIN */
function login(){
user = mobile.value;

if(!user || !password.value){
alert("Fill details");
return;
}

localStorage.setItem("user",user);

loginPage.style.display="none";
gamePage.style.display="block";

loadUser();
startGame();
}

/* AUTO LOGIN */
if(localStorage.getItem("user")){
user = localStorage.getItem("user");
loginPage.style.display="none";
gamePage.style.display="block";
loadUser();
startGame();
}

/* USER DATA */
function loadUser(){
let b = localStorage.getItem("bal_"+user);
balance = b ? Number(b) : 0;
balanceEl.innerText = balance;
}

function save(){
localStorage.setItem("bal_"+user,balance);
balanceEl.innerText = balance;
}

/* GAME SAFE LOOP */
function startGame(){

if(running) return;
running=true;

let m=1;
let crash=(Math.random()*4)+1.5;

statusEl.innerText="";

let loop=setInterval(()=>{

m+=0.02;

multiEl.innerText=m.toFixed(2)+"x";
plane.style.left=(m*25)+"px";

if(m>=crash){
clearInterval(loop);
running=false;
statusEl.innerText="CRASH 💥";
setTimeout(startGame,2000);
}

},120);
}

/* BET */
function placeBet(){
let b=Number(betAmount.value);

if(b<=0) return alert("Invalid");
if(b>balance) return alert("Low balance");
if(bet>0) return alert("Already bet");

balance-=b;
bet=b;
save();
}

/* CASHOUT */
function cashout(){
if(!bet) return alert("No bet");

let win=Math.floor(bet*parseFloat(multiEl.innerText));

balance+=win;
save();

statusEl.innerText="Won ₹"+win;

bet=0;
}

/* DEPOSIT FIX */
function deposit(){

let amt = Number(depAmount.value);

if(amt < 500){
alert("Min ₹500 required");
return;
}

alert("Deposit Request Sent\nUPI: 7260957661@ybl");

closeAll();
}

/* WITHDRAW FIX */
function withdraw(){
alert("Withdraw Request Sent");
closeAll();
}

/* UI */
function openDeposit(){
depositBox.style.display="block";
}

function openWithdraw(){
withdrawBox.style.display="block";
}

function closeAll(){
depositBox.style.display="none";
withdrawBox.style.display="none";
}

</script>

</body>
</html>l
