<!DOCTYPE html>
<html>
<head>
  <title>Aviator Full System</title>
  <style>
    body { font-family: Arial; background:#111; color:#fff; text-align:center; }
    input, button { padding:10px; margin:5px; }
    .page { display:none; }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="page" style="display:block;">
  <h2>Login</h2>
  <input id="mobile" placeholder="Mobile"><br>
  <input id="pass" placeholder="Password" type="password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- GAME -->
<div id="game" class="page">
  <h3>Balance: ₹<span id="bal">0</span></h3>
  <h1 id="multi">1.00x</h1>

  <input id="bet" placeholder="Bet"><br>
  <button onclick="startGame()">Start</button>
  <button onclick="cashout()">Cashout</button><br>

  <button onclick="showPage('deposit')">Deposit</button>
  <button onclick="showPage('withdraw')">Withdraw</button>

  <h4 id="status"></h4>
</div>

<!-- DEPOSIT -->
<div id="deposit" class="page">
  <h2>Deposit</h2>
  <input id="damount" placeholder="Amount"><br>
  <input id="utr" placeholder="UTR Number"><br>
  <button onclick="deposit()">Submit</button><br>
  <button onclick="back()">Back</button>
</div>

<!-- WITHDRAW -->
<div id="withdraw" class="page">
  <h2>Withdraw</h2>
  <input id="wamount" placeholder="Amount"><br>
  <button onclick="withdraw()">Submit</button><br>
  <button onclick="back()">Back</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, set, get, child, update, push, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "PASTE_YOUR_REAL_API_KEY_HERE",
  authDomain: "avaitior-game.firebaseapp.com",
  databaseURL: "https://avaitior-game-default-rtdb.firebaseio.com",
  projectId: "avaitior-game"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentUser = localStorage.getItem("user") || "";
let balance = 0;

// PAGE SWITCH
window.showPage = (p)=>{
  document.querySelectorAll('.page').forEach(x=>x.style.display='none');
  document.getElementById(p).style.display='block';
};
window.back = ()=> showPage('game');

// AUTO LOGIN
if(currentUser){
  showPage('game');
  loadUser();
}

// LOGIN
window.login = ()=>{
  let m = document.getElementById("mobile").value;
  let p = document.getElementById("pass").value;

  if(!m || !p) return alert("Enter details");

  currentUser = m;
  localStorage.setItem("user", m);

  get(child(ref(db), 'users/'+m)).then(snap=>{
    if(snap.exists()){
      let data = snap.val();
      if(data.password === p){
        loadUser();
        showPage('game');
      } else alert("Wrong password");
    } else {
      set(ref(db,'users/'+m),{password:p,balance:100});
      loadUser();
      showPage('game');
    }
  });
};

// REALTIME BALANCE
function loadUser(){
  onValue(ref(db,'users/'+currentUser), snap=>{
    if(snap.exists()){
      balance = snap.val().balance || 0;
      document.getElementById("bal").innerText = balance;
    }
  });
}

// GAME
let running=false, multi=1, crash;

window.startGame = ()=>{
  let bet = Number(document.getElementById("bet").value);
  if(bet<=0 || bet>balance) return alert("Invalid");

  balance -= bet;
  saveBalance();

  multi=1;
  crash = Math.random()*5+1;
  running=true;
};

// AUTO PLANE 24/7
function startAutoGame(){
  let int = setInterval(()=>{
    if(!running) return;

    multi+=0.1;
    document.getElementById("multi").innerText = multi.toFixed(2)+"x";

    if(multi>=crash){
      running=false;
      clearInterval(int);
      document.getElementById("status").innerText="Crashed ❌";

      setTimeout(startAutoGame, 2000);
    }
  },100);
}

// CASHOUT
window.cashout = ()=>{
  if(running){
    let bet = Number(document.getElementById("bet").value);
    let win = bet*multi;

    balance += win;
    saveBalance();

    running=false;
    document.getElementById("status").innerText="Win ₹"+Math.floor(win);
  }
};

// SAVE BALANCE
function saveBalance(){
  update(ref(db,'users/'+currentUser),{balance:balance});
}

// DEPOSIT
window.deposit = ()=>{
  let amt = damount.value;
  let u = utr.value;

  push(ref(db,'deposits'),{
    user: currentUser,
    amount: amt,
    utr: u,
    status: "pending"
  });

  alert("Deposit request sent");
};

// WITHDRAW
window.withdraw = ()=>{
  let amt = wamount.value;

  push(ref(db,'withdraws'),{
    user: currentUser,
    amount: amt,
    status: "pending"
  });

  alert("Withdraw request sent");
};

// START LOOP
window.onload = ()=>{
  startAutoGame();
};

</script>

</body>
</html>
