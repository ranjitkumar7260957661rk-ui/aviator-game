<!DOCTYPE html>
<html>
<head>
<title>Clean Aviator Game</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

.page{display:none;padding:20px;}

input,button{
padding:10px;
margin:5px;
border:none;
border-radius:5px;
}

button{
background:#00e5ff;
color:black;
font-weight:bold;
}

#multi{
font-size:50px;
color:#00ff99;
}

.popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#222;
padding:20px;
border-radius:10px;
width:280px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="page" style="display:block;">
<h2>Login</h2>
<input id="mobile" placeholder="Mobile"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<!-- GAME -->
<div id="gamePage" class="page">

<h3>Balance ₹<span id="balance">0</span></h3>

<div id="multi">1.00x</div>

<input id="betAmount" placeholder="Bet"><br>

<button onclick="bet()">BET</button>
<button onclick="cashout()">CASHOUT</button>

<h3 id="status"></h3>

<br>
<button onclick="openDeposit()">Deposit</button>
<button onclick="openWithdraw()">Withdraw</button>

</div>

<!-- DEPOSIT -->
<div id="depositBox" class="popup">
<h3>Deposit</h3>

<p>UPI: 7260957661@ybl</p>
<p>Min ₹500</p>

<input id="depAmount" placeholder="Amount"><br>
<input id="utr" placeholder="UTR"><br>

<button onclick="deposit()">Submit</button>
<button onclick="closeAll()">Close</button>
</div>

<!-- WITHDRAW -->
<div id="withdrawBox" class="popup">
<h3>Withdraw</h3>

<input id="wname" placeholder="Name"><br>
<input id="bank" placeholder="Bank"><br>
<input id="acc" placeholder="Account"><br>
<input id="ifsc" placeholder="IFSC"><br>
<input id="wamount" placeholder="Amount"><br>

<button onclick="withdraw()">Submit</button>
<button onclick="closeAll()">Close</button>
</div>

<script>

/* STATE */
let user="";
let balance=0;
let bet=0;
let running=false;

/* LOGIN FIX */
function login(){
let m=document.getElementById("mobile").value;
let p=document.getElementById("password").value;

if(!m || !p){
alert("Fill details");
return;
}

user=m;
localStorage.setItem("user",user);

document.getElementById("loginPage").style.display="none";
document.getElementById("gamePage").style.display="block";

loadUser();
startGame();
}

/* AUTO LOGIN FIX */
if(localStorage.getItem("user")){
user=localStorage.getItem("user");

document.getElementById("loginPage").style.display="none";
document.getElementById("gamePage").style.display="block";

loadUser();
startGame();
}

/* BALANCE */
function loadUser(){
let b=localStorage.getItem("bal_"+user);
balance=b?Number(b):0;
document.getElementById("balance").innerText=balance;
}

function save(){
localStorage.setItem("bal_"+user,balance);
document.getElementById("balance").innerText=balance;
}

/* GAME SAFE */
function startGame(){

if(running) return;
running=true;

let m=1;
let crash=(Math.random()*4)+1.5;

status.innerText="";

let loop=setInterval(()=>{

m+=0.02;

multi.innerText=m.toFixed(2)+"x";

if(m>=crash){
clearInterval(loop);
running=false;
status.innerText="CRASH 💥";
setTimeout(startGame,2000);
}

},120);
}

/* BET */
function bet(){
let b=Number(betAmount.value);

if(b<=0) return alert("Invalid");
if(b>balance) return alert("Low balance");
if(bet>0) return alert("Already bet");

balance-=b;
bet=b;
save();
}

/* CASHOUT */
function cashout(){
if(!bet) return alert("No bet");

let win=Math.floor(bet*parseFloat(multi.innerText));

balance+=win;
save();

status.innerText="Won ₹"+win;

bet=0;
}

/* DEPOSIT FIX */
function deposit(){
let amt=Number(depAmount.value);

if(amt<500){
alert("Min ₹500 required");
return;
}

alert("Deposit sent\nUPI: 7260957661@ybl");
closeAll();
}

/* WITHDRAW FIX */
function withdraw(){
alert("Withdraw sent");
closeAll();
}

/* UI */
function openDeposit(){
depositBox.style.display="block";
}

function openWithdraw(){
withdrawBox.style.display="block";
}

function closeAll(){
depositBox.style.display="none";
withdrawBox.style.display="none";
}

</script>

</body>
</html>
